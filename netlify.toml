# =============================================
# Netlify deployment configuration
# =============================================

[build]
  command = "node scripts/generate-config.js"
  publish = "."

# js/config.js is generated at build time from the SUPABASE_URL and
# SUPABASE_ANON_KEY environment variables (see scripts/generate-config.js).
# The anon key is a PUBLIC key designed for client-side use
# (see: supabase.com/docs/guides/api/api-keys) — data is protected by RLS
# policies, not by keeping this key secret. We still omit it from the
# secrets scanner so the build doesn't get blocked.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "js/config.js"

# Security headers — applied to all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Redirect bare domain → index.html (Netlify handles this automatically,
# but explicit rules here ensure it works for sub-paths too)
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200
