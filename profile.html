<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diving Skills — Profile</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .profile-hero {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .profile-info { min-width: 0; }
    .profile-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .profile-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .edit-form    { display: none; }
    .edit-form.visible { display: block; }
    .view-mode.hidden  { display: none; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content fade-in" id="main-content">
    <div class="loading-overlay">
      <div class="loading-spinner loading-spinner-lg"></div>
      <span>Loading profile…</span>
    </div>
  </main>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/app.js"></script>

<script>
  let currentUser = null;

  (async function initProfilePage() {
    initSupabase();
    const user = await Auth.init(true);
    if (!user) return;
    currentUser = user;
    App.renderNav(user);
    await renderProfile(user);
  })();

  async function renderProfile(user) {
    const main = document.getElementById('main-content');

    // Fetch extra data based on role
    let extraHtml = '';

    if (user.role === 'diver') {
      const [stats, coach] = await Promise.all([
        SupabaseDB.getCompletionStats(user.id),
        SupabaseDB.getDiverCoach(user.id),
      ]);
      extraHtml = `
        <!-- Stats -->
        <div class="content-section">
          <div class="section-title">My Stats</div>
          <div class="card-grid">
            <div class="stat-card">
              <div class="stat-value">${stats.confirmed}</div>
              <div class="stat-label">Skills Confirmed</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" style="color:var(--pending)">${stats.selfReported}</div>
              <div class="stat-label">Self-Reported</div>
            </div>
          </div>
        </div>

        <!-- Coach info -->
        <div class="content-section">
          <div class="section-title">My Coach</div>
          <div class="card card-sm">
            ${coach
              ? `<div class="flex items-center gap-3">
                  <div class="avatar avatar-md">${Auth.getInitials(coach.full_name)}</div>
                  <div>
                    <div style="font-weight:600">${App.escHtml(coach.full_name)}</div>
                    <div class="text-sm text-secondary">${App.escHtml(coach.email)}</div>
                  </div>
                 </div>`
              : `<p class="text-secondary text-sm">No coach assigned yet. Contact your club admin.</p>`
            }
          </div>
        </div>
      `;
    } else if (user.role === 'coach') {
      const roster = await SupabaseDB.getRoster(user.id);
      extraHtml = `
        <div class="content-section">
          <div class="section-title">My Roster (${roster.length} diver${roster.length !== 1 ? 's' : ''})</div>
          <div class="card card-sm">
            ${roster.length === 0
              ? `<p class="text-secondary text-sm">No divers yet. <a href="roster.html">Add divers</a>.</p>`
              : roster.slice(0, 5).map(r => `
                  <div class="list-item">
                    <div class="avatar-sm">${Auth.getInitials(r.diver.full_name)}</div>
                    <div class="list-item-content">
                      <div class="list-item-title">${App.escHtml(r.diver.full_name)}</div>
                      <div class="list-item-subtitle">${App.escHtml(r.diver.email)}</div>
                    </div>
                    <a href="progress.html?diver=${r.diver.id}" class="btn btn-ghost btn-sm">View →</a>
                  </div>
                `).join('')
            }
            ${roster.length > 5 ? `<div class="mt-3"><a href="roster.html" class="btn btn-ghost btn-sm">View all ${roster.length} divers →</a></div>` : ''}
          </div>
        </div>
      `;
    } else if (user.role === 'parent') {
      const links = await SupabaseDB.getLinkedDivers(user.id);
      extraHtml = `
        <div class="content-section">
          <div class="section-title">Linked Divers</div>
          <div class="card card-sm">
            ${links.length === 0
              ? `<p class="text-secondary text-sm">No divers linked yet. Contact your coach.</p>`
              : links.map(l => `
                  <div class="list-item">
                    <div class="avatar-sm">${Auth.getInitials(l.diver.full_name)}</div>
                    <div class="list-item-content">
                      <div class="list-item-title">${App.escHtml(l.diver.full_name)}</div>
                    </div>
                    <a href="progress.html?diver=${l.diver.id}" class="btn btn-ghost btn-sm">Progress →</a>
                  </div>
                `).join('')
            }
          </div>
        </div>
      `;
    }

    main.innerHTML = `
      <div class="page-header">
        <h1>My Profile</h1>
      </div>

      <!-- Profile hero -->
      <div class="card mb-6">
        <div class="profile-hero">
          <div class="avatar avatar-lg" id="profile-avatar">${Auth.getInitials(user.full_name)}</div>
          <div class="profile-info">
            <div class="profile-name" id="profile-name">${App.escHtml(user.full_name)}</div>
            <div class="profile-meta">
              <span class="role-chip ${user.role}">${Auth.getRoleLabel(user.role)}</span>
              <span class="text-secondary text-sm">${App.escHtml(user.email)}</span>
            </div>
          </div>
        </div>

        <!-- View mode -->
        <div id="view-mode">
          <div class="divider"></div>
          <button class="btn btn-secondary btn-sm" onclick="toggleEdit(true)">✏️ Edit Name</button>
        </div>

        <!-- Edit form -->
        <div id="edit-form" class="edit-form">
          <div class="divider"></div>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="edit-name" class="form-input" value="${App.escHtml(user.full_name)}">
          </div>
          <div id="edit-alert" class="alert mb-3"></div>
          <div class="flex gap-3">
            <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveProfile()">Save Changes</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleEdit(false)">Cancel</button>
          </div>
        </div>
      </div>

      ${extraHtml}

      <!-- Account section -->
      <div class="content-section">
        <div class="section-title">Account</div>
        <div class="card card-sm">
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-title">Email Address</div>
              <div class="list-item-subtitle">${App.escHtml(user.email)}</div>
            </div>
          </div>
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-title">Role</div>
              <div class="list-item-subtitle text-capitalize">${Auth.getRoleLabel(user.role)}</div>
            </div>
          </div>
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-title">Password</div>
              <div class="list-item-subtitle">••••••••</div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="toggleChangePassword(true)">Change</button>
          </div>

          <!-- Change password form -->
          <div id="password-form" class="edit-form">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" id="current-password" class="form-input" autocomplete="current-password">
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" id="new-password" class="form-input" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <input type="password" id="confirm-password" class="form-input" autocomplete="new-password">
            </div>
            <div id="password-alert" class="alert mb-3"></div>
            <div class="flex gap-3">
              <button class="btn btn-primary btn-sm" id="password-save-btn" onclick="changePassword()">Update Password</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleChangePassword(false)">Cancel</button>
            </div>
          </div>

          <div class="list-item" style="border-bottom:none; padding-top:16px">
            <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sign Out</button>
          </div>
        </div>
      </div>
    `;
  }

  function toggleEdit(show) {
    document.getElementById('edit-form').classList.toggle('edit-form', true);
    document.getElementById('edit-form').style.display = show ? 'block' : 'none';
    document.getElementById('view-mode').style.display  = show ? 'none' : 'block';
    if (show) document.getElementById('edit-name').focus();
  }

  function toggleChangePassword(show) {
    const form = document.getElementById('password-form');
    form.style.display = show ? 'block' : 'none';
    if (show) {
      document.getElementById('current-password').focus();
    } else {
      document.getElementById('current-password').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
      document.getElementById('password-alert').className = 'alert mb-3';
    }
  }

  async function changePassword() {
    const currentInput = document.getElementById('current-password');
    const newInput     = document.getElementById('new-password');
    const confirmInput = document.getElementById('confirm-password');
    const btn          = document.getElementById('password-save-btn');
    const alertEl      = document.getElementById('password-alert');

    const currentPassword = currentInput.value;
    const newPassword     = newInput.value;
    const confirmPassword = confirmInput.value;

    if (!currentPassword) {
      alertEl.className   = 'alert alert-error visible mb-3';
      alertEl.textContent = 'Please enter your current password.';
      return;
    }
    if (newPassword.length < 6) {
      alertEl.className   = 'alert alert-error visible mb-3';
      alertEl.textContent = 'New password must be at least 6 characters.';
      return;
    }
    if (newPassword !== confirmPassword) {
      alertEl.className   = 'alert alert-error visible mb-3';
      alertEl.textContent = 'New passwords do not match.';
      return;
    }
    alertEl.className = 'alert mb-3';

    App.setBtnLoading(btn, true);
    try {
      await Auth.changePassword(currentPassword, newPassword);
      toggleChangePassword(false);
      App.showToast('Password updated!');
    } catch (err) {
      alertEl.className   = 'alert alert-error visible mb-3';
      alertEl.textContent = err.message;
    } finally {
      App.setBtnLoading(btn, false);
    }
  }

  async function saveProfile() {
    const nameInput = document.getElementById('edit-name');
    const btn       = document.getElementById('save-btn');
    const alertEl   = document.getElementById('edit-alert');

    const newName = nameInput.value.trim();
    if (!newName || newName.length < 2) {
      alertEl.className  = 'alert alert-error visible mb-3';
      alertEl.textContent = 'Please enter a valid name.';
      return;
    }
    alertEl.className = 'alert mb-3';

    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.updateProfile(currentUser.id, { full_name: newName });
      currentUser.full_name = newName;
      // Update displayed name and initials
      document.getElementById('profile-name').textContent  = newName;
      document.getElementById('profile-avatar').textContent = Auth.getInitials(newName);
      // Update sidebar avatar
      App.renderNav(currentUser);
      toggleEdit(false);
      App.showToast('Profile updated!');
    } catch (err) {
      alertEl.className  = 'alert alert-error visible mb-3';
      alertEl.textContent = err.message;
    } finally {
      App.setBtnLoading(btn, false);
    }
  }
</script>

</body>
</html>
