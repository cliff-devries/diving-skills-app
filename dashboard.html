<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dive Drills — Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-wrapper">
  <!-- Sidebar (desktop) -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main content -->
  <main class="main-content fade-in" id="main-content">
    <div class="loading-overlay">
      <div class="loading-spinner loading-spinner-lg"></div>
      <span>Loading your dashboard…</span>
    </div>
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/app.js"></script>

<script>
  // =============================================
  // Dashboard — role-aware home screen
  // =============================================

  (async function initDashboard() {
    initSupabase();

    const user = await Auth.init(true);
    if (!user) return;

    App.renderNav(user);

    // Route to the appropriate dashboard renderer
    switch (user.role) {
      case 'coach':  await renderCoachDashboard(user);  break;
      case 'diver':  await renderDiverDashboard(user);  break;
      case 'parent': await renderParentDashboard(user); break;
      default:
        document.getElementById('main-content').innerHTML =
          '<p class="text-secondary">Unknown role. Please contact support.</p>';
    }
  })();

  // =============================================
  // COACH DASHBOARD
  // =============================================
  async function renderCoachDashboard(user) {
    const main = document.getElementById('main-content');

    // Load roster, skills ready for testing, and pending profile claims in parallel
    const [roster, readyForTest, claims] = await Promise.all([
      SupabaseDB.getRoster(user.id),
      SupabaseDB.getReadyForTestForCoach(user.id),
      SupabaseDB.getPendingClaimsForCoach(user.id),
    ]);

    main.innerHTML = `
      <div class="page-header">
        <h1>Welcome back, ${App.escHtml(user.full_name.split(' ')[0])} 👋</h1>
        <p>Here's what's happening with your team today.</p>
      </div>

      <!-- Stat cards -->
      <div class="card-grid mb-6">
        <div class="stat-card">
          <div class="stat-value">${roster.length}</div>
          <div class="stat-label">Divers on Roster</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: ${readyForTest.length ? 'var(--pending)' : 'var(--accent)'}">
            ${readyForTest.length}
          </div>
          <div class="stat-label">Ready for Testing</div>
        </div>
      </div>

      <!-- Pending profile claims -->
      ${claims.length ? `
      <div class="content-section">
        <div class="section-title" style="color:var(--pending)">🔗 Pending Profile Claims</div>
        <div class="card card-sm" id="claims-list">
          ${claims.map(c => `
            <div class="list-item" id="claim-${c.id}">
              <div class="avatar-sm">${Auth.getInitials(c.profile?.full_name ?? '')}</div>
              <div class="list-item-content">
                <div class="list-item-title">${App.escHtml(c.profile?.full_name ?? 'Unknown')}</div>
                <div class="list-item-subtitle">
                  Someone is claiming this profile · ${App.formatRelative(c.created_at)}
                </div>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-primary btn-sm"
                  onclick="approveClaim('${c.id}', this)">Approve</button>
                <button class="btn btn-ghost btn-sm"
                  onclick="rejectClaim('${c.id}', this)">Reject</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- Skills ready for testing -->
      <div class="content-section">
        <div class="section-title">Ready for Testing</div>
        <div id="ready-list">
          ${renderReadyForTestList(readyForTest)}
        </div>
      </div>

      <!-- Roster preview -->
      <div class="content-section">
        <div class="card-header" style="margin-bottom: 14px">
          <div class="section-title" style="margin-bottom:0">Your Roster</div>
          <a href="roster.html" class="btn btn-ghost btn-sm">View All →</a>
        </div>
        <div id="roster-preview">
          ${roster.length === 0
            ? `<div class="empty-state">
                <div class="empty-state-icon">👥</div>
                <p>No divers yet. <a href="roster.html">Add divers to your roster</a>.</p>
               </div>`
            : roster.slice(0, 5).map(r => renderDiverRow(r.diver)).join('')
          }
        </div>
      </div>
    `;

  }

  function renderReadyForTestList(readyForTest) {
    if (!readyForTest.length) {
      return `<div class="empty-state" style="padding: 24px">
        <div class="empty-state-icon">✅</div>
        <p>No skills awaiting testing — you're all caught up!</p>
      </div>`;
    }
    return `<div class="card card-sm">
      ${readyForTest.slice(0, 8).map(p => `
        <a href="progress.html?diver=${p.diver?.id}" class="list-item">
          <div class="avatar-sm">${Auth.getInitials(p.diver?.full_name ?? '')}</div>
          <div class="list-item-content">
            <div class="list-item-title">${App.escHtml(p.diver?.full_name ?? 'Unknown Diver')}</div>
            <div class="list-item-subtitle">${App.escHtml(p.skill?.skill_name ?? 'Unknown skill')} · ready since ${App.formatRelative(p.ready_for_test_at)}</div>
          </div>
          <span class="badge badge-pending">Test now →</span>
        </a>
      `).join('')}
    </div>`;
  }

  function renderDiverRow(diver) {
    return `
      <a href="progress.html?diver=${diver.id}" class="diver-row">
        <div class="avatar-sm">${Auth.getInitials(diver.full_name)}</div>
        <div class="list-item-content">
          <div class="list-item-title">${App.escHtml(diver.full_name)}</div>
          <div class="list-item-subtitle">${App.escHtml(diver.email)}</div>
        </div>
        <span>→</span>
      </a>
    `;
  }

  async function approveClaim(claimId, btn) {
    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.approveClaim(claimId);
      document.getElementById(`claim-${claimId}`)?.remove();
      App.showToast('Profile claim approved! The diver can now log in.');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  async function rejectClaim(claimId, btn) {
    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.rejectClaim(claimId);
      document.getElementById(`claim-${claimId}`)?.remove();
      App.showToast('Claim rejected. The diver will need to try again.');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  // =============================================
  // DIVER DASHBOARD
  // =============================================
  async function renderDiverDashboard(user) {
    const main = document.getElementById('main-content');

    const [stats, recentAttempts, coach] = await Promise.all([
      SupabaseDB.getCompletionStats(user.id),
      SupabaseDB.getRecentTestAttempts(user.id, 6),
      SupabaseDB.getDiverCoach(user.id),
    ]);

    main.innerHTML = `
      <div class="page-header">
        <h1>Hey, ${App.escHtml(user.full_name.split(' ')[0])} 🏊</h1>
        <p>${coach ? `Coach: <strong>${App.escHtml(coach.full_name)}</strong>` : 'No coach assigned yet'}</p>
      </div>

      <!-- Stats -->
      <div class="card-grid mb-6">
        <div class="stat-card">
          <div class="stat-value" style="color:#3b82f6">${stats.attained}</div>
          <div class="stat-label">Skills Attained</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: var(--pending)">${stats.readyForTest}</div>
          <div class="stat-label">Ready for Test</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: var(--accent)">${stats.certified}</div>
          <div class="stat-label">Certified</div>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="content-section">
        <div class="section-title">Quick Actions</div>
        <div class="flex gap-3 flex-wrap">
          <a href="skills.html" class="btn btn-primary">🎯 Browse Skills</a>
          <a href="progress.html" class="btn btn-secondary">📊 My Progress</a>
        </div>
      </div>

      <!-- Recent activity -->
      <div class="content-section">
        <div class="section-title">Recent Activity</div>
        ${recentAttempts.length === 0
          ? `<div class="empty-state" style="padding: 28px">
              <div class="empty-state-icon">🎯</div>
              <p>No test attempts yet. <a href="progress.html">View your progress</a> to get started.</p>
             </div>`
          : `<div class="card card-sm">
              ${recentAttempts.map(a => `
                <div class="list-item">
                  <div class="list-item-content">
                    <div class="list-item-title">${App.escHtml(a.skill?.skill_name ?? `Skill #${a.skill_id}`)}</div>
                    <div class="list-item-subtitle">${App.formatDate(a.test_date)}</div>
                  </div>
                  <span class="badge badge-accent">${a.score}/10</span>
                </div>
              `).join('')}
             </div>`
        }
      </div>
    `;
  }

  // =============================================
  // PARENT DASHBOARD
  // =============================================
  async function renderParentDashboard(user) {
    const main = document.getElementById('main-content');

    const links = await SupabaseDB.getLinkedDivers(user.id);

    main.innerHTML = `
      <div class="page-header">
        <h1>Hello, ${App.escHtml(user.full_name.split(' ')[0])} 👋</h1>
        <p>Tracking progress for your diver${links.length !== 1 ? 's' : ''}.</p>
      </div>

      ${links.length === 0
        ? `<div class="empty-state">
            <div class="empty-state-icon">🔗</div>
            <p>No divers linked to your account yet. Contact your coach to get connected.</p>
           </div>`
        : `<div class="content-section">
            <div class="section-title">Your Diver${links.length !== 1 ? 's' : ''}</div>
            ${links.map(l => `
              <a href="progress.html?diver=${l.diver.id}" class="diver-row">
                <div class="avatar avatar-md">${Auth.getInitials(l.diver.full_name)}</div>
                <div class="list-item-content">
                  <div class="list-item-title">${App.escHtml(l.diver.full_name)}</div>
                  <div class="list-item-subtitle">View progress →</div>
                </div>
              </a>
            `).join('')}
           </div>`
      }
    `;
  }
</script>

</body>
</html>
