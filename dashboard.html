<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dive Drills — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/styles.css?v=5">
</head>
<body>

<div class="app-wrapper">
  <!-- Sidebar (desktop) -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main content -->
  <main class="main-content fade-in" id="main-content">
    <div class="loading-overlay">
      <div class="loading-spinner loading-spinner-lg"></div>
      <span>Loading your dashboard…</span>
    </div>
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js?v=8"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/app.js?v=5"></script>

<script>
  // =============================================
  // Dashboard — role-aware home screen
  // =============================================

  (async function initDashboard() {
    initSupabase();

    const user = await Auth.init(true);
    if (!user) return;

    App.renderNav(user);

    // Route to the appropriate dashboard renderer
    switch (user.role) {
      case 'coach':  await renderCoachDashboard(user);  break;
      case 'diver':  await renderDiverDashboard(user);  break;
      case 'parent': await renderParentDashboard(user); break;
      default:
        document.getElementById('main-content').innerHTML =
          '<p class="text-secondary">Unknown role. Please contact support.</p>';
    }
  })();

  // =============================================
  // COACH DASHBOARD
  // =============================================
  let coachUserId = null;

  async function renderCoachDashboard(user) {
    const main = document.getElementById('main-content');
    coachUserId = user.id;

    const isSuperUser = user.is_super_user === true || user.role === 'super_user';

    const [
      roster, claims, pendingCoaches, clubSettings,
      fullLevelsReadyToTest, totalSkillsReadyToTest,
      skillsAttainedThisMonth, totalSkillsAttained,
    ] = await Promise.all([
      SupabaseDB.getRoster(user.id),
      SupabaseDB.getPendingClaimsForCoach(user.id),
      SupabaseDB.getPendingCoaches(),
      SupabaseDB.getClubSettings(['usa_diving_ranking', 'aau_diving_ranking']),
      SupabaseDB.getFullLevelsReadyToTest(user.id),
      SupabaseDB.getTotalSkillsReadyToTest(user.id),
      SupabaseDB.getSkillsAttainedThisMonth(user.id),
      SupabaseDB.getTotalSkillsAttained(user.id),
    ]);

    main.innerHTML = `
      <div class="page-header">
        <h1>Carpe Divum, ${App.escHtml(App.firstName(user))}! 👋</h1>
        <p>Welcome to the Upstate Diving Skills Tracker. Today is a great day to seize the sky.</p>
      </div>

      <!-- Club Goals -->
      <div class="mb-6">
        ${clubGoalsBannerHtml(roster.length, clubSettings.usa_diving_ranking)}
      </div>

      <!-- Row 1 -->
      <div class="card-grid-3 mb-6">
        <div class="stat-card">
          <div class="stat-value">${roster.length}</div>
          <div class="stat-label">Divers on Roster</div>
        </div>
        <a href="testing.html" class="stat-card" style="text-decoration:none;display:block;cursor:pointer;" title="Start a Testing Session">
          <div class="stat-value" style="color: ${fullLevelsReadyToTest ? 'var(--pending)' : 'var(--accent)'}">
            ${fullLevelsReadyToTest}
          </div>
          <div class="stat-label">Full Levels Ready to Test ↗</div>
        </a>
        <div class="stat-card">
          <div class="stat-value" style="color: ${totalSkillsReadyToTest ? 'var(--pending)' : 'var(--accent)'}">
            ${totalSkillsReadyToTest}
          </div>
          <div class="stat-label">Skills Ready to Test</div>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="card-grid-2 mb-6">
        <div class="stat-card">
          <div class="stat-value" style="color:#3b82f6">${skillsAttainedThisMonth}</div>
          <div class="stat-label">Skills Attained This Month</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:#3b82f6">${totalSkillsAttained}</div>
          <div class="stat-label">Total Skills Attained</div>
        </div>
      </div>

      <!-- Row 3 -->
      <div class="card-grid-2 mb-6">
        ${rankingCardHtml('usa_diving_ranking', 'USA Diving Ranking', clubSettings.usa_diving_ranking, isSuperUser)}
        ${rankingCardHtml('aau_diving_ranking', 'AAU Diving Ranking', clubSettings.aau_diving_ranking, isSuperUser)}
      </div>

      <!-- Pending coach requests -->
      ${pendingCoaches.length ? `
      <div class="content-section">
        <div class="section-title" style="color:var(--pending)">👤 Pending Coach Requests</div>
        <div class="card card-sm" id="pending-coaches-list">
          ${pendingCoaches.map(c => `
            <div class="list-item" id="pending-coach-${c.id}">
              <div class="avatar-sm">${Auth.getInitials(c.full_name ?? '')}</div>
              <div class="list-item-content">
                <div class="list-item-title">${App.escHtml(c.full_name ?? 'Unknown')}</div>
                <div class="list-item-subtitle">
                  ${App.escHtml(c.email ?? '')} · Requested ${App.formatRelative(c.created_at)}
                </div>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-primary btn-sm"
                  onclick="approveCoach('${c.id}', this)">Approve</button>
                <button class="btn btn-sm" style="background:var(--danger,#e05252);color:#fff;"
                  onclick="rejectCoach('${c.id}', this)">Reject</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- Pending profile claims -->
      ${claims.length ? `
      <div class="content-section">
        <div class="section-title" style="color:var(--pending)">🔗 Pending Profile Claims</div>
        <div class="card card-sm" id="claims-list">
          ${claims.map(c => `
            <div class="list-item" id="claim-${c.id}">
              <div class="avatar-sm">${Auth.getInitials(c.profile?.full_name ?? '')}</div>
              <div class="list-item-content">
                <div class="list-item-title">${App.escHtml(c.profile?.full_name ?? 'Unknown')}</div>
                <div class="list-item-subtitle">
                  Someone is claiming this profile · ${App.formatRelative(c.created_at)}
                </div>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-primary btn-sm"
                  onclick="approveClaim('${c.id}', this)">Approve</button>
                <button class="btn btn-ghost btn-sm"
                  onclick="rejectClaim('${c.id}', this)">Reject</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

    `;

  }

  // =============================================
  // CLUB GOALS BANNER
  // =============================================
  const ROSTER_GOAL = 200;
  const RANKING_GOAL = 10;
  const RANKING_FLOOR = 200;

  function clubGoalsBannerHtml(rosterCount, usaRanking) {
    const rosterPct = Math.min(100, Math.round((rosterCount / ROSTER_GOAL) * 100));

    const hasRanking = usaRanking !== null && usaRanking !== undefined && String(usaRanking).trim() !== '';
    const rankingNum = hasRanking ? Number(usaRanking) : null;
    const validRanking = hasRanking && !isNaN(rankingNum);

    let rankingPct = 0;
    let rankingAchieved = false;
    if (validRanking) {
      rankingPct = Math.min(100, Math.max(0, Math.round(((RANKING_FLOOR - rankingNum) / RANKING_FLOOR) * 100)));
      rankingAchieved = rankingNum <= RANKING_GOAL;
    }

    const goal2Value = validRanking
      ? `Currently Ranked #${App.escHtml(String(usaRanking))} — Goal: Top ${RANKING_GOAL}${rankingAchieved ? ' ✅' : ''}`
      : 'Not yet ranked';

    return `
      <div class="club-goals-banner">
        <div class="club-goals-label">🎯 Club Goals</div>
        <div class="club-goals-grid">
          <div class="club-goal">
            <div class="club-goal-title">Divers on Roster</div>
            <div class="club-goal-value">${rosterCount} / ${ROSTER_GOAL} Divers</div>
            <div class="club-goal-progress">
              <div class="progress-bar"><div class="progress-bar-fill" style="width: ${rosterPct}%"></div></div>
              <div class="progress-bar-pct">${rosterPct}%</div>
            </div>
          </div>
          <div class="club-goal">
            <div class="club-goal-title">USA Diving Nationals</div>
            <div class="club-goal-value">${goal2Value}</div>
            <div class="club-goal-progress">
              <div class="progress-bar"><div class="progress-bar-fill" style="width: ${rankingPct}%"></div></div>
              ${validRanking ? `<div class="progress-bar-pct">${rankingPct}%</div>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // =============================================
  // EDITABLE RANKING CARDS (USA / AAU Diving Ranking)
  // =============================================
  function rankingCardHtml(key, label, value, isSuperUser) {
    const hasValue = value !== null && value !== undefined && String(value).trim() !== '';
    const display  = hasValue ? App.escHtml(String(value)) : '--';

    return `
      <div class="stat-card">
        <div class="stat-value" id="ranking-value-${key}">${display}</div>
        <div class="flex items-center justify-between">
          <div class="stat-label">${label}</div>
          ${isSuperUser ? `<button class="icon-btn-edit" onclick="editRanking('${key}')" aria-label="Edit ${App.escHtml(label)}" title="Edit ${App.escHtml(label)}">✏️</button>` : ''}
        </div>
        ${isSuperUser ? `
        <div class="ranking-edit-row hidden" id="ranking-edit-${key}">
          <input type="text" class="form-input" id="ranking-input-${key}" placeholder="e.g. 12" value="${hasValue ? App.escHtml(String(value)) : ''}">
          <button class="btn btn-primary btn-sm" id="ranking-save-${key}" onclick="saveRanking('${key}', '${label}')">Save</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelRanking('${key}')">Cancel</button>
        </div>` : ''}
      </div>
    `;
  }

  function editRanking(key) {
    document.getElementById(`ranking-edit-${key}`).classList.remove('hidden');
    document.getElementById(`ranking-input-${key}`).focus();
  }

  function cancelRanking(key) {
    document.getElementById(`ranking-edit-${key}`).classList.add('hidden');
  }

  async function saveRanking(key, label) {
    const input = document.getElementById(`ranking-input-${key}`);
    const btn   = document.getElementById(`ranking-save-${key}`);
    const value = input.value.trim();

    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.setClubSetting(key, value, coachUserId);
      document.getElementById(`ranking-value-${key}`).textContent = value || '--';
      document.getElementById(`ranking-edit-${key}`).classList.add('hidden');
      App.showToast(`${label} updated.`);
    } catch (err) {
      App.showToast(err.message, 'error');
    } finally {
      App.setBtnLoading(btn, false);
    }
  }

  async function approveCoach(profileId, btn) {
    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.approveCoach(profileId);
      document.getElementById(`pending-coach-${profileId}`)?.remove();
      App.showToast('Coach approved successfully.');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  async function rejectCoach(profileId, btn) {
    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.rejectCoach(profileId);
      document.getElementById(`pending-coach-${profileId}`)?.remove();
      App.showToast('Coach request rejected.');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  async function approveClaim(claimId, btn) {
    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.approveClaim(claimId);
      document.getElementById(`claim-${claimId}`)?.remove();
      App.showToast('Profile claim approved! The diver can now log in.');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  async function rejectClaim(claimId, btn) {
    App.setBtnLoading(btn, true);
    try {
      await SupabaseDB.rejectClaim(claimId);
      document.getElementById(`claim-${claimId}`)?.remove();
      App.showToast('Claim rejected. The diver will need to try again.');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  // =============================================
  // DIVER DASHBOARD
  // =============================================
  async function renderDiverDashboard(user) {
    const main = document.getElementById('main-content');

    const [stats, recentAttempts, coach, levelCompMap, totalDivers] = await Promise.all([
      SupabaseDB.getCompletionStats(user.id),
      SupabaseDB.getRecentTestAttempts(user.id, 6),
      SupabaseDB.getDiverCoach(user.id),
      SupabaseDB.getLevelCompletions(user.id),
      SupabaseDB.getTotalDiverCount(),
    ]);

    main.innerHTML = `
      <div class="page-header">
        <h1>Hey, ${App.escHtml(App.firstName(user))} 🏊</h1>
        <p>${coach ? `Coach: <strong>${App.escHtml(coach.full_name)}</strong>` : 'No coach assigned yet'}</p>
      </div>

      <!-- Stats -->
      <div class="card-grid mb-6">
        <div class="stat-card">
          <div class="stat-value">${totalDivers}</div>
          <div class="stat-label">Divers in Club</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:#3b82f6">${stats.attained}</div>
          <div class="stat-label">Skills Attained</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: var(--pending)">${stats.readyForTest}</div>
          <div class="stat-label">Ready for Test</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: var(--accent)">${stats.certified}</div>
          <div class="stat-label">Certified</div>
        </div>
      </div>

      <!-- Designations earned -->
      ${Object.keys(levelCompMap).length ? `
      <div class="content-section">
        <div class="section-title">Designations Earned</div>
        <div class="flex gap-2 flex-wrap">
          ${Object.entries(levelCompMap)
              .filter(([, lc]) => lc.designation)
              .sort(([a], [b]) => Number(a) - Number(b))
              .map(([lvl, lc]) => {
                const badge = lc.designation === 'gold'   ? '🥇 Gold'
                            : lc.designation === 'silver' ? '🥈 Silver'
                            : '🥉 Bronze';
                return `<span class="badge" style="font-size:0.85rem">L${lvl} ${badge}</span>`;
              }).join('') || '<span class="text-secondary text-sm">No designations yet</span>'}
        </div>
      </div>` : ''}

      <!-- Quick actions -->
      <div class="content-section">
        <div class="section-title">Quick Actions</div>
        <div class="flex gap-3 flex-wrap">
          <a href="skills.html" class="btn btn-primary">🎯 Browse Skills</a>
          <a href="progress.html" class="btn btn-secondary">📊 My Progress</a>
        </div>
      </div>

      <!-- Recent activity -->
      <div class="content-section">
        <div class="section-title">Recent Activity</div>
        ${recentAttempts.length === 0
          ? `<div class="empty-state" style="padding: 28px">
              <div class="empty-state-icon">🎯</div>
              <p>No test attempts yet. <a href="progress.html">View your progress</a> to get started.</p>
             </div>`
          : `<div class="card card-sm">
              ${recentAttempts.map(a => `
                <div class="list-item">
                  <div class="list-item-content">
                    <div class="list-item-title">${App.escHtml(a.skill?.skill_name ?? `Skill #${a.skill_id}`)}</div>
                    <div class="list-item-subtitle">${App.formatDate(a.test_date)}</div>
                  </div>
                  <span class="badge badge-accent">${a.score}/10</span>
                </div>
              `).join('')}
             </div>`
        }
      </div>
    `;
  }

  // =============================================
  // PARENT DASHBOARD
  // =============================================
  async function renderParentDashboard(user) {
    const main = document.getElementById('main-content');

    const [links, totalDivers] = await Promise.all([
      SupabaseDB.getLinkedDivers(user.id),
      SupabaseDB.getTotalDiverCount(),
    ]);
    links.sort((a, b) => App.compareNames(a.diver, b.diver));

    main.innerHTML = `
      <div class="page-header">
        <h1>Hello, ${App.escHtml(App.firstName(user))} 👋</h1>
        <p>Tracking progress for your diver${links.length !== 1 ? 's' : ''}.</p>
      </div>

      <div class="card-grid-2 mb-6">
        <div class="stat-card">
          <div class="stat-value">${totalDivers}</div>
          <div class="stat-label">Divers in Club</div>
        </div>
      </div>

      ${links.length === 0
        ? `<div class="empty-state">
            <div class="empty-state-icon">🔗</div>
            <p>No divers linked to your account yet. Contact your coach to get connected.</p>
           </div>`
        : `<div class="content-section">
            <div class="section-title">Your Diver${links.length !== 1 ? 's' : ''}</div>
            ${links.map(l => `
              <a href="progress.html?diver=${l.diver.id}" class="diver-row">
                <div class="avatar avatar-md">${Auth.getInitials(l.diver.full_name)}</div>
                <div class="list-item-content">
                  <div class="list-item-title">${App.escHtml(l.diver.full_name)}</div>
                  <div class="list-item-subtitle">View progress →</div>
                </div>
              </a>
            `).join('')}
           </div>`
      }
    `;
  }
</script>

</body>
</html>
