<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dive Drills — Testing Session</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/styles.css?v=6">
  <style>
    /* ---- Step 3: two-column testing layout ---- */
    #step-3.testing-step {
      padding-bottom: 0;
    }
    .testing-layout {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 0;
      height: 100vh;
      overflow: hidden;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
    }

    /* Left column — diver selector (full height, scrolls internally) */
    .diver-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 8px;
      background: var(--surface-2, #1a1f2e);
      border-right: 1px solid var(--border);
      height: 100%;
      overflow-y: auto;
    }
    .diver-panel-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 2px;
      padding: 0 2px;
    }
    .diver-avatar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      background: transparent;
      transition: all 0.15s;
      text-align: center;
      width: 100%;
    }
    .diver-avatar-btn:hover { background: var(--surface, #141826); }
    .diver-avatar-btn.active {
      border-color: var(--accent, #14b8a6);
      background: rgba(20, 184, 166, 0.1);
    }
    .diver-avatar-btn .diver-name-small {
      font-size: 0.65rem;
      color: var(--text-primary);
      line-height: 1.2;
      word-break: break-word;
    }
    .diver-avatar-btn .diver-progress-small {
      font-size: 0.58rem;
      color: var(--text-secondary);
    }
    .diver-avatar-btn.complete .diver-progress-small {
      color: #22c55e;
      font-weight: 600;
    }
    .diver-avatar-wrap {
      position: relative;
      display: inline-block;
    }
    .diver-complete-badge {
      display: none;
      position: absolute;
      bottom: -2px;
      right: -4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #22c55e;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--bg, #0f1117);
    }
    .diver-avatar-btn.complete .diver-complete-badge { display: flex; }
    .avatar-testing {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent, #14b8a6);
      color: #000;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Right column wrapper */
    .skill-col {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* TOP SECTION — scrollable compact skill list */
    .skill-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .skill-list-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg, #0f1117);
      z-index: 1;
    }
    .skill-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .skill-row:hover { background: var(--surface, #141826); }
    .skill-row.active {
      border-left-color: var(--accent, #14b8a6);
      background: rgba(20, 184, 166, 0.06);
    }
    .skill-row-info {
      flex: 1;
      min-width: 0;
    }
    .skill-name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }
    .skill-type-tag { font-size: 0.6rem; flex-shrink: 0; margin-top: 1px; }
    .skill-row-name {
      font-weight: 600;
      font-size: 0.86rem;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .skill-row-desc {
      font-size: 0.76rem;
      color: #a0a0a0;
      margin-top: 2px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .skill-row-cat {
      font-size: 0.67rem;
      color: var(--text-secondary);
      background: var(--surface-2, #1a1f2e);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .skill-score-badge {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      min-width: 34px;
      text-align: center;
      background: var(--surface-2, #1a1f2e);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .skill-row.scored .skill-score-badge {
      background: rgba(20, 184, 166, 0.12);
      color: var(--accent, #14b8a6);
      border-color: rgba(20, 184, 166, 0.3);
    }

    /* BOTTOM SECTION — fixed scoring panel */
    .scoring-panel {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 6px 12px 8px;
      background: var(--surface-2, #1a1f2e);
      border-top: 1px solid var(--border);
    }
    .scoring-clear-btn {
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--surface, #141826);
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      align-self: center;
      min-height: 28px;
    }
    .scoring-clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    .scoring-display-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    /* Two-column body: calculator (left) + stacked nav buttons (right) */
    .scoring-body {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .calc-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      min-width: 0;
      justify-items: center;
    }
    /* Squareness comes from width + aspect-ratio, not height: a grid track
       is often wider than 40px, and width:100% would win over aspect-ratio
       once max-height clamps the height, producing a wide rectangle. */
    .calc-btn {
      padding: 0;
      width: 100%;
      min-width: 30px;
      max-width: 40px;
      aspect-ratio: 1 / 1;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: var(--surface, #141826);
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      text-align: center;
    }
    .calc-btn:hover { border-color: var(--accent, #14b8a6); color: var(--accent, #14b8a6); }
    .calc-btn:active { background: rgba(20, 184, 166, 0.15); }

    /* Desktop: compact, left-aligned, rectangular keys — mobile keeps the
       stretched-square behavior above unchanged. */
    @media (min-width: 600px) {
      .calc-grid {
        flex: 0 0 auto;
        max-width: 190px;
        grid-template-columns: repeat(3, 54px);
        gap: 4px;
        justify-items: stretch;
      }
      .calc-btn {
        width: 54px;
        min-width: 54px;
        max-width: 54px;
        aspect-ratio: unset;
        height: 36px;
        min-height: 36px;
        max-height: 36px;
      }
    }

    /* Right column: Prev / Complete Diver / Next, stacked and identically sized */
    .scoring-nav-col {
      flex: 0 0 90px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .scoring-nav-btn {
      flex: 1 1 0;
      min-height: 44px;
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.15;
      padding: 2px 6px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: var(--surface, #141826);
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, opacity 0.1s;
      /* Wrap rather than ellipsis-truncate — "Complete (X/Y)" must stay
         readable at the 90px column width, not get cut mid-count. */
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .scoring-nav-btn:disabled { opacity: 0.4; cursor: default; }
    .scoring-nav-btn:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
    .scoring-nav-btn.scoring-complete-btn {
      border: none;
      background: var(--accent, #00c9a7);
      color: #000;
    }
    .scoring-nav-btn.scoring-complete-btn:disabled { opacity: 0.4; cursor: default; }
    .scoring-number {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent, #14b8a6);
      line-height: 1;
    }
    .scoring-number.unscored {
      color: var(--text-secondary);
      font-size: 1.3rem;
    }

    /* Very narrow screens: shrink calculator buttons only — nav buttons stay >=44px */
    @media (max-width: 360px) {
      .calc-btn { min-width: 26px; max-width: 36px; font-size: 0.78rem; }
      .scoring-nav-col { flex-basis: 76px; }
      .scoring-nav-btn { font-size: 0.68rem; }
    }

    /* Mobile: flex column, full height minus bottom nav */
    @media (max-width: 768px) {
      .testing-layout {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        height: calc(100dvh - var(--nav-bottom-height, 62px));
        overflow: hidden;
        border: none;
        border-radius: 0;
      }
      .diver-panel {
        flex-shrink: 0;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        height: auto;
        min-height: 72px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 8px 10px;
      }
      .diver-avatar-btn {
        min-width: 54px;
        max-width: 66px;
      }
      .skill-col {
        flex: 1;
        min-height: 0;
        height: auto;
        overflow: hidden;
      }
    }

    /* ---- Designation badges ---- */
    .badge-gold   { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
    .badge-silver { background: rgba(156,163,175,.15); color: #9ca3af; border: 1px solid rgba(156,163,175,.3); }
    .badge-bronze { background: rgba(180,120,60,.15); color: #b47c3c; border: 1px solid rgba(180,120,60,.3); }

    /* ---- Session complete / diver summary ---- */
    .session-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .diver-result-card {
      background: var(--surface, #141826);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .diver-result-card.has-designation,
    .diver-result-card.has-passed {
      border-color: var(--accent, #14b8a6);
    }
    .diver-result-card.has-failed {
      border-color: #ef4444;
    }
    .skills-below-list {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .skills-below-list li { margin: 2px 0; }

    /* ---- Step 1 search ---- */
    .search-wrapper {
      position: relative;
      max-width: 520px;
    }
    .search-wrapper .form-input {
      padding-right: 40px;
      font-size: 1rem;
      height: 50px;
    }
    .search-clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      padding: 4px 6px;
      display: none;
    }
    .search-clear-btn:hover { color: var(--text-primary); }
    .search-results-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface-2, #1a1f2e);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    }
    .search-result-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .search-result-row:hover { background: rgba(255,255,255,0.04); }
    .search-result-row + .search-result-row { border-top: 1px solid var(--border); }
    .search-result-row.already-selected { opacity: 0.42; cursor: default; pointer-events: none; }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-name { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
    .search-result-badges { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
    .search-no-results { padding: 14px 16px; color: var(--text-secondary); font-size: 0.88rem; text-align: center; }
    .search-add-btn {
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      border-radius: 7px;
      border: 1.5px solid var(--accent, #14b8a6);
      background: transparent;
      color: var(--accent, #14b8a6);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s;
      min-height: 36px;
    }
    .search-add-btn:hover { background: rgba(20, 184, 166, 0.15); }
    .selected-diver-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface, #141826);
    }
    .selected-diver-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .selected-diver-bottom {
      padding-left: 44px; /* avatar(34px) + gap(10px) */
    }
    .selected-diver-remove {
      margin-left: auto;
      padding: 4px 9px;
      font-size: 0.85rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.1s, color 0.1s;
      min-height: 30px;
    }
    .selected-diver-remove:hover { border-color: #ef4444; color: #ef4444; }
    .step1-section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .testing-step { padding-bottom: 32px; }
    .testing-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content fade-in" id="main-content">

    <!-- STEP 1: Select Divers -->
    <div id="step-1" class="testing-step">
      <div class="page-header">
        <h1>Testing Session</h1>
        <p>Search for divers to add to this testing session.</p>
      </div>

      <div id="step1-loading" style="display:none;">
        <div class="loading-overlay">
          <div class="loading-spinner loading-spinner-lg"></div>
          <span>Loading…</span>
        </div>
      </div>

      <div id="step1-search-ui" style="display:none;">
        <div class="search-wrapper">
          <input id="diver-search" class="form-input" type="text"
            placeholder="Search by name…" autocomplete="off" spellcheck="false"
            oninput="onDiverSearchInput(this.value)">
          <button id="diver-search-clear" class="search-clear-btn"
            onclick="clearDiverSearch()" aria-label="Clear search">×</button>
          <div id="search-results" class="search-results-dropdown" style="display:none;"></div>
        </div>

        <div id="selected-section" style="display:none; margin-top:28px; max-width:520px;">
          <div class="step1-section-label">
            Selected for this session
            <span id="selected-count" class="badge"></span>
          </div>
          <div id="selected-divers-list" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
      </div>

      <div class="testing-actions">
        <button id="btn-to-step2" class="btn btn-primary btn-lg" onclick="goToStep2()" disabled>
          Continue to Session Summary →
        </button>
      </div>
    </div>

    <!-- STEP 2: Session Summary -->
    <div id="step-2" class="testing-step hidden">
      <div class="page-header">
        <h1>Session Summary</h1>
        <p id="step2-subtitle"></p>
      </div>
      <div id="step2-content"></div>
      <div class="testing-actions">
        <button class="btn btn-ghost" onclick="goToStep1()">← Back</button>
        <button class="btn btn-primary btn-lg" onclick="startTesting()">Start Testing →</button>
      </div>
    </div>

    <!-- STEP 3: Testing Screen -->
    <div id="step-3" class="testing-step hidden" style="padding:0;">
      <div class="testing-layout">
        <div class="diver-panel" id="diver-panel"></div>
        <div class="skill-col">
          <div class="skill-list" id="skill-list"></div>
          <div class="scoring-panel" id="scoring-panel"></div>
        </div>
      </div>
    </div>

    <!-- SESSION COMPLETE -->
    <div id="step-complete" class="testing-step hidden">
      <div class="page-header">
        <h1>Session Complete! 🎉</h1>
        <p id="session-complete-subtitle"></p>
      </div>
      <div id="session-complete-content" class="session-summary-grid"></div>
      <div class="testing-actions" style="margin-top:32px;">
        <a href="dashboard.html" class="btn btn-secondary">← Return to Dashboard</a>
        <button class="btn btn-primary" onclick="startNewSession()">Start New Session</button>
      </div>
    </div>

  </main>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- Confirmation modal -->
<div id="confirm-modal" style="display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);">
  <div class="card" style="max-width:420px;width:90%;margin:0 auto;animation:slideUp .22s ease;">
    <h3 id="confirm-modal-title" style="margin-bottom:8px;"></h3>
    <p id="confirm-modal-body" style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:20px;"></p>
    <div class="flex gap-3">
      <button class="btn btn-ghost" onclick="closeConfirmModal()">Cancel</button>
      <button id="confirm-modal-ok" class="btn btn-primary">Confirm</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js?v=20"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/app.js?v=6"></script>

<script>
  // =============================================
  // State
  // =============================================
  let currentUser     = null;
  let rosterDivers    = [];  // [diver] — all divers on coach's roster
  let selectedMap     = {};  // {diverId: {diver, selectedLevel}}
  let sessionDivers   = [];  // [{diver, level, skills}] — ordered list for testing
  let currentDiverIdx = 0;
  let activeSkillId   = null; // skill currently shown in the scoring panel
  let sessionScores   = {};  // {diverId: {skillId: {value, completionId}}}
  let diverNotes      = {};  // {diverId: string} — per-diver session notes
  let completedDivers = {};  // {diverId: result}
  let confirmCallback = null;

  // Display order for skill-type groups — matches skills.html / progress.html
  // so Step 3's skill list follows the same curriculum order everywhere.
  const SECTION_ORDER = [
    'Basics', 'Conditioning', 'Flexibility', 'Trampoline', 'Trampoline in Belt',
    'Dryboard', 'Dryboard in Belt', 'Dry Platform', '1m Platform', '1m Platform in Belt',
    '1m Springboard', '3m Springboard', 'Platform', 'Pool', 'Games', 'Bonus',
  ];

  // Sort by SECTION_ORDER position first (unknown types sort last), then by
  // skill_order within each type.
  function compareBySection(a, b) {
    const aIdx = SECTION_ORDER.indexOf(a.type);
    const bIdx = SECTION_ORDER.indexOf(b.type);
    const sectionDiff = (aIdx === -1 ? SECTION_ORDER.length : aIdx) - (bIdx === -1 ? SECTION_ORDER.length : bIdx);
    if (sectionDiff !== 0) return sectionDiff;
    return App.compareSkillOrder(a, b);
  }

  // =============================================
  // Init
  // =============================================
  (async function initTestingPage() {
    initSupabase();
    const user = await Auth.init(true);
    if (!user) return;
    if (user.role !== 'coach') {
      window.location.href = 'dashboard.html';
      return;
    }
    currentUser = user;
    App.renderNav(user);
    await loadStep1();
  })();

  // =============================================
  // STEP 1 — Select Divers (search-based)
  // =============================================
  let step1SearchQuery = '';

  async function loadStep1() {
    const loadingEl = document.getElementById('step1-loading');
    const searchUi  = document.getElementById('step1-search-ui');
    loadingEl.style.display = 'block';
    searchUi.style.display  = 'none';

    try {
      rosterDivers = await SupabaseDB.getAllDivers();
      loadingEl.style.display = 'none';

      if (!rosterDivers.length) {
        searchUi.innerHTML = `<div class="empty-state" style="padding:40px">
          <div class="empty-state-icon">📋</div>
          <p>No divers in the club yet.</p>
        </div>`;
        searchUi.style.display = 'block';
        return;
      }

      searchUi.style.display = 'block';
      setTimeout(() => document.getElementById('diver-search')?.focus(), 60);
    } catch (err) {
      loadingEl.style.display = 'none';
      searchUi.innerHTML = `<div class="empty-state"><p>Error loading divers: ${App.escHtml(err.message)}</p></div>`;
      searchUi.style.display = 'block';
    }
  }

  function onDiverSearchInput(value) {
    step1SearchQuery = value;
    const clearBtn = document.getElementById('diver-search-clear');
    if (clearBtn) clearBtn.style.display = value.length ? 'block' : 'none';

    const q = value.trim().toLowerCase();
    if (!q) { hideSearchResults(); return; }

    const matches = rosterDivers.filter(d => {
      const first = (d.first_name || '').toLowerCase();
      const last  = (d.last_name  || '').toLowerCase();
      const full  = (d.full_name  || '').toLowerCase();
      return first.includes(q) || last.includes(q) || full.includes(q);
    }).slice(0, 5);

    renderSearchResults(matches);
  }

  function renderSearchResults(divers) {
    const dropdown = document.getElementById('search-results');
    if (!dropdown) return;
    if (!divers.length) {
      dropdown.innerHTML = `<div class="search-no-results">No divers found matching your search</div>`;
      dropdown.style.display = 'block';
      return;
    }
    dropdown.innerHTML = divers.map(d => {
      const initials  = Auth.getInitials(d.full_name);
      const name      = App.escHtml(App.formatNameLastFirst(d));
      const lvl       = d.current_level === 0 ? 'Beginner' : `L${d.current_level ?? 1}`;
      const lvlCls    = d.current_level === 0 ? 'badge badge-secondary' : 'badge badge-level';
      const genderBadge = d.gender ? `<span class="badge">${App.escHtml(d.gender)}</span>` : '';
      const already   = !!selectedMap[d.id];
      return `
        <div class="search-result-row${already ? ' already-selected' : ''}"
          ${already ? '' : `onclick="addDiverToSession('${d.id}')"`}>
          <div class="avatar-sm">${App.escHtml(initials)}</div>
          <div class="search-result-info">
            <div class="search-result-name">${name}</div>
            <div class="search-result-badges">
              <span class="${lvlCls}">${lvl}</span>
              ${genderBadge}
            </div>
          </div>
          ${already
            ? `<span style="color:var(--accent);font-weight:700;font-size:0.9rem;">✓</span>`
            : `<button class="search-add-btn" onclick="event.stopPropagation();addDiverToSession('${d.id}')">+ Add</button>`}
        </div>`;
    }).join('');
    dropdown.style.display = 'block';
  }

  function hideSearchResults() {
    const el = document.getElementById('search-results');
    if (el) el.style.display = 'none';
  }

  function addDiverToSession(diverId) {
    const diver = rosterDivers.find(d => d.id === diverId);
    if (!diver || selectedMap[diverId]) return;
    selectedMap[diverId] = { diver, selectedLevel: Math.max(1, diver.current_level ?? 1) };
    renderSelectedDivers();
    updateContinueButton();
    clearDiverSearch();
  }

  function removeDiverFromSession(diverId) {
    delete selectedMap[diverId];
    renderSelectedDivers();
    updateContinueButton();
  }

  function renderSelectedDivers() {
    const section = document.getElementById('selected-section');
    const list    = document.getElementById('selected-divers-list');
    const countEl = document.getElementById('selected-count');
    const entries = Object.values(selectedMap);

    if (!entries.length) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    if (countEl) countEl.textContent = `(${entries.length})`;

    list.innerHTML = entries.map(({ diver, selectedLevel }) => {
      const initials = Auth.getInitials(diver.full_name);
      const name     = App.escHtml(App.formatNameLastFirst(diver));
      const opts     = Array.from({ length: 12 }, (_, i) => i + 1)
        .map(i => `<option value="${i}"${i === selectedLevel ? ' selected' : ''}>Level ${i}</option>`)
        .join('');
      return `
        <div class="selected-diver-card">
          <div class="selected-diver-top">
            <div class="avatar-sm">${App.escHtml(initials)}</div>
            <div class="search-result-name" style="flex:1;min-width:0;">${name}</div>
            <button class="selected-diver-remove"
              onclick="removeDiverFromSession('${diver.id}')" aria-label="Remove">✕</button>
          </div>
          <div class="selected-diver-bottom">
            <select class="form-select" style="width:165px;font-size:0.82rem;"
              onchange="updateSelectedLevel('${diver.id}', this.value)">${opts}</select>
          </div>
        </div>`;
    }).join('');
  }

  function updateContinueButton() {
    const btn   = document.getElementById('btn-to-step2');
    if (!btn) return;
    const count = Object.keys(selectedMap).length;
    btn.disabled    = count === 0;
    btn.textContent = count === 0
      ? 'Continue to Session Summary →'
      : `Continue with ${count} diver${count !== 1 ? 's' : ''} →`;
  }

  function clearDiverSearch() {
    const input = document.getElementById('diver-search');
    if (input) { input.value = ''; input.focus(); }
    const clearBtn = document.getElementById('diver-search-clear');
    if (clearBtn) clearBtn.style.display = 'none';
    hideSearchResults();
    step1SearchQuery = '';
  }

  function updateSelectedLevel(diverId, level) {
    if (selectedMap[diverId]) selectedMap[diverId].selectedLevel = parseInt(level, 10);
  }

  // =============================================
  // STEP 2 — Session Summary
  // =============================================
  function goToStep1() {
    showStep('step-1');
  }

  function goToStep2() {
    const divers = Object.values(selectedMap);
    if (!divers.length) return;

    const totalNote = `${divers.length} diver${divers.length > 1 ? 's' : ''} selected`;
    document.getElementById('step2-subtitle').textContent = totalNote;

    const rows = divers.map(({ diver, selectedLevel }) => `
      <div class="list-item">
        <div class="avatar-sm">${App.escHtml(Auth.getInitials(diver.full_name))}</div>
        <div class="list-item-content">
          <div class="list-item-title">${App.escHtml(App.formatNameLastFirst(diver))}</div>
          <div class="list-item-subtitle">Testing Level ${selectedLevel}</div>
        </div>
        <span class="badge badge-level">L${selectedLevel}</span>
      </div>`).join('');

    document.getElementById('step2-content').innerHTML =
      `<div class="card card-sm">${rows}</div>`;

    showStep('step-2');
  }

  // =============================================
  // STEP 3 — Testing Screen
  // =============================================
  async function startTesting() {
    sessionDivers = Object.values(selectedMap).map(({ diver, selectedLevel }) => ({
      diver, level: selectedLevel, skills: null,
    }));
    sessionScores   = {};
    diverNotes      = {};
    completedDivers = {};

    showStep('step-3');
    adjustStep3Layout();
    renderDiverPanel();
    await loadDiverSkills(0);
    selectDiver(0);
  }

  function adjustStep3Layout() {
    const main = document.getElementById('main-content');
    main.style.padding  = '0';
    main.style.maxWidth = 'none';
    main.style.overflow = 'hidden';
  }

  function renderDiverPanel() {
    const panel = document.getElementById('diver-panel');
    panel.innerHTML = `<div class="diver-panel-title">Divers</div>` +
      sessionDivers.map((sd, idx) => {
        const initials  = Auth.getInitials(sd.diver.full_name);
        const firstName = sd.diver.first_name || sd.diver.full_name.split(' ')[0] || '';
        return `
          <button class="diver-avatar-btn" id="diver-btn-${idx}"
            onclick="switchDiver(${idx})" aria-label="${App.escHtml(App.formatNameLastFirst(sd.diver))}">
            <div class="diver-avatar-wrap">
              <div class="avatar-testing">${App.escHtml(initials)}</div>
              <div class="diver-complete-badge">✓</div>
            </div>
            <div class="diver-name-small">${App.escHtml(firstName)}</div>
            <div class="diver-progress-small" id="diver-progress-${idx}">—</div>
          </button>`;
      }).join('');
  }

  async function loadDiverSkills(idx) {
    const sd = sessionDivers[idx];
    if (sd.skills !== null) return;
    try {
      sd.skills = await SupabaseDB.getTestingSkillsForDiverLevel(sd.diver.id, sd.level);
      sd.skills.sort(compareBySection);
      sessionScores[sd.diver.id] = {};
    } catch (err) {
      sd.skills = [];
      App.showToast('Error loading skills: ' + err.message, 'error');
    }
  }

  async function switchDiver(idx) {
    if (idx === currentDiverIdx && document.getElementById('skill-list').children.length > 0) return;
    currentDiverIdx = idx;
    await loadDiverSkills(idx);
    selectDiver(idx);
  }

  function selectDiver(idx) {
    currentDiverIdx = idx;
    document.querySelectorAll('.diver-avatar-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === idx);
    });
    renderSkillPanel(idx);
  }

  // ---- Compact skill list ----

  function renderSkillPanel(idx) {
    const sd          = sessionDivers[idx];
    const skillListEl = document.getElementById('skill-list');
    const scores      = sessionScores[sd.diver.id] || {};

    if (!sd.skills) {
      skillListEl.innerHTML = `<div class="loading-overlay"><div class="loading-spinner loading-spinner-lg"></div><span>Loading skills…</span></div>`;
      document.getElementById('scoring-panel').innerHTML = '';
      return;
    }
    if (!sd.skills.length) {
      skillListEl.innerHTML = `<div class="empty-state"><p>No testable skills for Level ${sd.level}.</p></div>`;
      document.getElementById('scoring-panel').innerHTML = '';
      return;
    }

    const firstName  = sd.diver.first_name || sd.diver.full_name.split(' ')[0] || '';
    const savedNotes = App.escHtml(diverNotes[sd.diver.id] || '');

    skillListEl.innerHTML = `
      <div class="skill-list-header">
        <div style="font-weight:600;font-size:0.9rem;">${App.escHtml(firstName)}</div>
        <span class="badge badge-level">L${sd.level}</span>
        <div class="text-sm text-secondary" style="margin-left:auto">${sd.skills.length} skills</div>
      </div>
      ${sd.skills.map(skill => buildSkillRow(skill, sd.diver.id, scores)).join('')}
      <div style="padding:12px 16px 10px;border-top:1px solid var(--border);margin-top:4px;">
        <label class="form-label" style="font-size:0.72rem;margin-bottom:4px"
          for="diver-notes-${sd.diver.id}">Notes for ${App.escHtml(firstName)}</label>
        <textarea id="diver-notes-${sd.diver.id}" class="form-input" rows="2"
          style="resize:vertical;font-size:0.82rem;"
          placeholder="Optional session notes…"
          oninput="saveDiverNote('${sd.diver.id}', this.value)">${savedNotes}</textarea>
      </div>`;

    // Default to first skill
    activeSkillId = sd.skills[0]?.id ?? null;
    if (activeSkillId !== null) {
      const firstRow = document.getElementById(`skill-row-${activeSkillId}`);
      if (firstRow) firstRow.classList.add('active');
    }

    renderScoringPanel(idx);
    updateScoredCountLabel(idx);
    updateCompleteDiverBtn(idx);
  }

  function buildSkillRow(skill, diverId, scores) {
    const scored    = scores[skill.id];
    const scoreVal  = scored ? parseFloat(scored.value) : null;
    const isScored  = scoreVal !== null;
    const typeBadge = skill.type
      ? `<span class="badge badge-secondary skill-type-tag">${App.escHtml(skill.type)}</span>` : '';
    const catBadge  = skill.category
      ? `<span class="skill-row-cat">${App.escHtml(skill.category)}</span>` : '';
    const descHtml  = skill.description
      ? `<div class="skill-row-desc">${App.escHtml(skill.description)}</div>` : '';
    return `
      <div class="skill-row${isScored ? ' scored' : ''}" id="skill-row-${skill.id}"
        data-skill-id="${skill.id}" onclick="selectSkillForScoring(${skill.id})">
        <div class="skill-row-info">
          <div class="skill-name-row">
            <span class="skill-row-name">${App.escHtml(skill.name)}</span>
            ${typeBadge}
          </div>
          ${descHtml}
          ${catBadge}
        </div>
        <span class="skill-score-badge">${isScored ? scoreVal.toFixed(1) : '—'}</span>
      </div>`;
  }

  function selectSkillForScoring(skillId) {
    document.querySelectorAll('.skill-row').forEach(row => {
      row.classList.toggle('active', parseInt(row.dataset.skillId, 10) === skillId);
    });
    activeSkillId = skillId;
    renderScoringPanel(currentDiverIdx);
  }

  // ---- Scoring panel ----

  function renderScoringPanel(idx) {
    const sd       = sessionDivers[idx];
    const scores   = sessionScores[sd.diver.id] || {};
    const skill    = activeSkillId !== null ? sd.skills?.find(s => s.id === activeSkillId) : null;
    const scored   = skill ? scores[skill.id] : null;
    const scoreVal = scored ? parseFloat(scored.value) : null;

    const numText  = scoreVal !== null ? scoreVal.toFixed(1) : '—';
    const numClass = scoreVal !== null ? 'scoring-number' : 'scoring-number unscored';

    const currentSkillIdx = sd.skills ? sd.skills.findIndex(s => s.id === activeSkillId) : -1;
    const isFirstSkill    = currentSkillIdx === 0;
    const isLastSkill     = currentSkillIdx >= 0 && currentSkillIdx === (sd.skills?.length || 0) - 1;

    const totalScored = Object.keys(sessionScores[sd.diver.id] || {}).length;
    const total       = sd.skills?.length || 0;

    document.getElementById('scoring-panel').innerHTML = `
      <div class="scoring-display-row">
        <div style="display:flex;align-items:center;gap:8px;min-width:0">
          <div class="${numClass}" id="scoring-number">${numText}</div>
          ${skill?.type ? `<span class="badge badge-secondary skill-type-tag">${App.escHtml(skill.type)}</span>` : ''}
        </div>
        <button class="scoring-clear-btn" onclick="clearScore()">C</button>
      </div>
      <div class="scoring-body">
        <div class="calc-grid">
          <button class="calc-btn" onclick="calcInput(7)">7</button>
          <button class="calc-btn" onclick="calcInput(8)">8</button>
          <button class="calc-btn" onclick="calcInput(9)">9</button>
          <button class="calc-btn" onclick="calcInput(4)">4</button>
          <button class="calc-btn" onclick="calcInput(5)">5</button>
          <button class="calc-btn" onclick="calcInput(6)">6</button>
          <button class="calc-btn" onclick="calcInput(1)">1</button>
          <button class="calc-btn" onclick="calcInput(2)">2</button>
          <button class="calc-btn" onclick="calcInput(3)">3</button>
          <button class="calc-btn" onclick="calcInput(0)">0</button>
          <button class="calc-btn" onclick="calcInput(10)">10</button>
          <button class="calc-btn" onclick="calcInput(0.5)">.5</button>
        </div>
        <div class="scoring-nav-col">
          <button class="scoring-nav-btn" id="btn-prev"
            onclick="moveToPrevSkill()" ${isFirstSkill ? 'disabled' : ''}>← Prev</button>
          <button class="scoring-nav-btn scoring-complete-btn" id="btn-complete-diver"
            onclick="confirmCompleteDiver()" ${totalScored === 0 ? 'disabled' : ''}>
            Complete (${totalScored}/${total})
          </button>
          <button class="scoring-nav-btn" id="btn-advance"
            onclick="advanceToNextSkill()" ${isLastSkill ? 'disabled' : ''}>
            ${isLastSkill ? 'Last ✓' : 'Next →'}
          </button>
        </div>
      </div>`;
  }

  // Tap a digit button: sets score directly.
  // Tap .5: toggles the half-point on the current score.
  function calcInput(val) {
    if (activeSkillId === null) return;
    const sd      = sessionDivers[currentDiverIdx];
    const scores  = sessionScores[sd.diver.id] || {};
    const current = scores[activeSkillId] ? parseFloat(scores[activeSkillId].value) : null;

    let newScore;
    if (val === 0.5) {
      if (current === null) {
        newScore = 0.5;
      } else if (current % 1 !== 0) {
        newScore = Math.floor(current); // remove existing .5
      } else {
        newScore = Math.min(10, current + 0.5); // add .5
      }
    } else {
      newScore = val;
    }
    setActiveSkillScore(newScore);
  }

  function setActiveSkillScore(scoreVal) {
    const sd      = sessionDivers[currentDiverIdx];
    const diverId = sd.diver.id;
    recordScore(activeSkillId, diverId, scoreVal);

    const numEl = document.getElementById('scoring-number');
    if (numEl) { numEl.textContent = scoreVal.toFixed(1); numEl.classList.remove('unscored'); }

    const row = document.getElementById(`skill-row-${activeSkillId}`);
    if (row) {
      row.classList.add('scored');
      const badge = row.querySelector('.skill-score-badge');
      if (badge) badge.textContent = scoreVal.toFixed(1);
    }

    updateScoredCountLabel(currentDiverIdx);
    updateCompleteDiverBtn(currentDiverIdx);
  }

  function clearScore() {
    if (activeSkillId === null) return;
    const sd      = sessionDivers[currentDiverIdx];
    const diverId = sd.diver.id;
    if (sessionScores[diverId]) delete sessionScores[diverId][activeSkillId];

    const numEl = document.getElementById('scoring-number');
    if (numEl) { numEl.textContent = '—'; numEl.classList.add('unscored'); }

    const row = document.getElementById(`skill-row-${activeSkillId}`);
    if (row) {
      row.classList.remove('scored');
      const badge = row.querySelector('.skill-score-badge');
      if (badge) badge.textContent = '—';
    }

    updateScoredCountLabel(currentDiverIdx);
    updateCompleteDiverBtn(currentDiverIdx);
  }

  function advanceToNextSkill() {
    const sd = sessionDivers[currentDiverIdx];
    if (!sd.skills || !sd.skills.length) return;
    const currentIdx = activeSkillId !== null
      ? sd.skills.findIndex(s => s.id === activeSkillId)
      : -1;
    const nextIdx = currentIdx + 1;
    if (nextIdx >= sd.skills.length) return;
    const nextSkill = sd.skills[nextIdx];
    selectSkillForScoring(nextSkill.id);
    document.getElementById(`skill-row-${nextSkill.id}`)
      ?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function moveToPrevSkill() {
    const sd = sessionDivers[currentDiverIdx];
    if (!sd.skills || !sd.skills.length) return;
    const currentIdx = activeSkillId !== null
      ? sd.skills.findIndex(s => s.id === activeSkillId)
      : -1;
    const prevIdx = currentIdx - 1;
    if (prevIdx < 0) return;
    const prevSkill = sd.skills[prevIdx];
    selectSkillForScoring(prevSkill.id);
    document.getElementById(`skill-row-${prevSkill.id}`)
      ?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function recordScore(skillId, diverId, value) {
    if (!sessionScores[diverId]) sessionScores[diverId] = {};
    const sd    = sessionDivers.find(s => s.diver.id === diverId);
    const skill = sd?.skills?.find(s => s.id === skillId);
    sessionScores[diverId][skillId] = { value, completionId: skill?.completionId || null };
  }

  function updateScoredCountLabel(idx) {
    if (idx !== currentDiverIdx) return;
    const sd     = sessionDivers[idx];
    const scored = Object.keys(sessionScores[sd.diver.id] || {}).length;
    const total  = sd.skills?.length || 0;
    const progEl = document.getElementById(`diver-progress-${idx}`);
    if (progEl) progEl.textContent = `${scored}/${total}`;
  }

  function updateCompleteDiverBtn(idx) {
    if (idx !== currentDiverIdx) return;
    const sd     = sessionDivers[idx];
    const scored = Object.keys(sessionScores[sd.diver.id] || {}).length;
    const total  = sd.skills?.length || 0;
    const btn    = document.getElementById('btn-complete-diver');
    if (btn) {
      btn.disabled    = scored === 0;
      btn.textContent = `Complete (${scored}/${total})`;
    }
  }

  function saveDiverNote(diverId, value) {
    diverNotes[diverId] = value;
  }

  // =============================================
  // Complete Diver — confirm + save
  // =============================================
  function confirmCompleteDiver() {
    console.log('Complete Diver button clicked');
    const sd        = sessionDivers[currentDiverIdx];
    const firstName = sd.diver.first_name || sd.diver.full_name.split(' ')[0] || '';
    const scored    = Object.keys(sessionScores[sd.diver.id] || {}).length;
    openConfirmModal(
      `Save scores for ${firstName}?`,
      `This will record all ${scored} scored skills for Level ${sd.level}.`,
      () => completeDiver(currentDiverIdx)
    );
  }

  async function completeDiver(idx) {
    const sd     = sessionDivers[idx];
    const scores = sessionScores[sd.diver.id] || {};
    const notes  = diverNotes[sd.diver.id] || '';

    const btn = document.getElementById('btn-complete-diver');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

    try {
      const result = await SupabaseDB.saveTestingSessionDiver({
        diverId:  sd.diver.id,
        level:    sd.level,
        coachId:  currentUser.id,
        scores,
        notes,
        testDate: new Date().toISOString().slice(0, 10),
      });

      completedDivers[sd.diver.id] = { ...result, diver: sd.diver, level: sd.level, scores, skills: sd.skills };

      const diverBtn = document.getElementById(`diver-btn-${idx}`);
      if (diverBtn) diverBtn.classList.add('complete');
      const progEl = document.getElementById(`diver-progress-${idx}`);
      if (progEl) progEl.textContent = '✓ Done';

      App.showToast(`${sd.diver.first_name || 'Diver'} saved!`);
      renderDiverResult(idx, result);

      const next = sessionDivers.findIndex((s, i) => i !== idx && !completedDivers[s.diver.id]);
      if (next >= 0) {
        setTimeout(() => switchDiver(next), 1200);
      } else {
        setTimeout(() => showSessionComplete(), 1500);
      }
    } catch (err) {
      App.showToast('Error saving: ' + err.message, 'error');
      if (btn) { btn.disabled = false; updateCompleteDiverBtn(idx); }
    }
  }

  function renderDiverResult(idx, result) {
    const sd     = sessionDivers[idx];
    const scores = sessionScores[sd.diver.id] || {};
    const below  = sd.skills.filter(sk => {
      const s = scores[sk.id];
      return s && parseFloat(s.value) < 5.0;
    });

    const desigHtml   = designationHtml(result.designation, result.passed);
    const borderColor = result.passed ? 'var(--accent)' : '#ef4444';
    document.getElementById('skill-list').innerHTML = `
      <div class="card" style="margin:16px;border-color:${borderColor}">
        <div class="flex items-center gap-3 mb-4">
          <div class="avatar-sm">${App.escHtml(Auth.getInitials(sd.diver.full_name))}</div>
          <div>
            <div style="font-weight:600">${App.escHtml(App.formatNameLastFirst(sd.diver))}</div>
            <div class="text-sm text-secondary">Level ${sd.level} · ${result.scoredCount} skills scored</div>
          </div>
          ${desigHtml}
        </div>
        <div class="card-grid-2 mb-4">
          <div class="stat-card">
            <div class="stat-value" style="color:var(--accent)">${result.averageScore.toFixed(1)}</div>
            <div class="stat-label">Average Score</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${result.scoredCount}</div>
            <div class="stat-label">Skills Scored</div>
          </div>
        </div>
        ${below.length ? `
          <div class="text-sm" style="font-weight:600;color:#ef4444;margin-bottom:4px">
            Skills below passing score:
          </div>
          <ul class="skills-below-list">
            ${below.map(sk => `<li>· ${App.escHtml(sk.name)} — ${(parseFloat(scores[sk.id]?.value) || 0).toFixed(1)}</li>`).join('')}
          </ul>
        ` : `<div class="text-sm" style="color:#22c55e">✓ All skills scored ≥ 5.0</div>`}
      </div>`;

    document.getElementById('scoring-panel').innerHTML =
      `<div style="padding:8px 0;text-align:center;color:#22c55e;font-weight:600;font-size:0.9rem">✓ Saved successfully</div>`;
  }

  // =============================================
  // Session Complete
  // =============================================
  function showSessionComplete() {
    const completed   = Object.values(completedDivers);
    const totalSkills = completed.reduce((sum, d) => sum + d.scoredCount, 0);

    document.getElementById('session-complete-subtitle').textContent =
      `${completed.length} diver${completed.length !== 1 ? 's' : ''} tested · ${totalSkills} total skills scored`;

    document.getElementById('session-complete-content').innerHTML =
      completed.map(d => {
        const below = d.skills.filter(sk => {
          const s = d.scores[sk.id];
          return s && parseFloat(s.value) < 5.0;
        });
        const cardClass = d.designation ? 'has-designation' : d.passed ? 'has-passed' : 'has-failed';
        return `
          <div class="diver-result-card ${cardClass}">
            <div class="flex items-center gap-3 mb-3">
              <div class="avatar-sm">${App.escHtml(Auth.getInitials(d.diver.full_name))}</div>
              <div>
                <div style="font-weight:600">${App.escHtml(App.formatNameLastFirst(d.diver))}</div>
                <div class="text-sm text-secondary">Level ${d.level}</div>
              </div>
              ${designationHtml(d.designation, d.passed)}
            </div>
            <div class="flex gap-3 flex-wrap">
              <span class="text-sm text-secondary">Avg: <strong style="color:var(--accent)">${d.averageScore.toFixed(1)}</strong></span>
              <span class="text-sm text-secondary">${d.scoredCount} skills</span>
            </div>
            ${below.length ? `
              <div class="skills-below-list mt-2">
                <div style="font-size:0.75rem;font-weight:600;color:#ef4444">Skills below passing score:</div>
                <ul>${below.map(sk => `<li>· ${App.escHtml(sk.name)} — ${(parseFloat(d.scores[sk.id]?.value) || 0).toFixed(1)}</li>`).join('')}</ul>
              </div>
            ` : ''}
          </div>`;
      }).join('');

    const main = document.getElementById('main-content');
    main.style.padding  = '';
    main.style.maxWidth = '';
    main.style.overflow = '';

    showStep('step-complete');
  }

  function startNewSession() {
    selectedMap     = {};
    sessionDivers   = [];
    sessionScores   = {};
    diverNotes      = {};
    completedDivers = {};

    const main = document.getElementById('main-content');
    main.style.padding  = '';
    main.style.maxWidth = '';
    main.style.overflow = '';

    // Reset search UI — roster already in memory, no need to refetch.
    clearDiverSearch();
    const section = document.getElementById('selected-section');
    if (section) section.style.display = 'none';
    const list = document.getElementById('selected-divers-list');
    if (list) list.innerHTML = '';
    updateContinueButton();

    showStep('step-1');
    setTimeout(() => document.getElementById('diver-search')?.focus(), 60);
  }

  // =============================================
  // Helpers
  // =============================================
  function showStep(stepId) {
    ['step-1', 'step-2', 'step-3', 'step-complete'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('hidden', id !== stepId);
    });
    window.scrollTo(0, 0);
  }

  function designationHtml(designation, passed) {
    if (!passed) return '<span class="badge" style="background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)">❌ Not Passed</span>';
    if (designation === 'gold')   return '<span class="badge badge-gold">🥇 Gold</span>';
    if (designation === 'silver') return '<span class="badge badge-silver">🥈 Silver</span>';
    if (designation === 'bronze') return '<span class="badge badge-bronze">🥉 Bronze</span>';
    return '<span class="badge" style="background:rgba(20,184,166,.15);color:#14b8a6;border:1px solid rgba(20,184,166,.3)">✅ Passed</span>';
  }

  // =============================================
  // Confirm Modal
  // =============================================
  function openConfirmModal(title, body, onConfirm) {
    document.getElementById('confirm-modal-title').textContent = title;
    document.getElementById('confirm-modal-body').textContent  = body;
    confirmCallback = onConfirm;
    const modal = document.getElementById('confirm-modal');
    modal.style.display = 'flex';
  }

  function closeConfirmModal() {
    document.getElementById('confirm-modal').style.display = 'none';
    confirmCallback = null;
  }

  document.getElementById('confirm-modal-ok').addEventListener('click', async () => {
    console.log('Confirm button clicked');
    console.log('confirmCallback type:', typeof confirmCallback);
    console.log('confirmCallback value:', confirmCallback);
    console.log('currentDiverIdx:', currentDiverIdx);
    console.log('sessionDivers length:', (sessionDivers || []).length);
    // Capture callback BEFORE closeConfirmModal() nulls it out.
    const cb = confirmCallback;
    closeConfirmModal();
    try {
      if (typeof cb === 'function') {
        console.log('Calling confirmCallback...');
        await cb();
        console.log('confirmCallback returned successfully');
      } else {
        console.error('confirmCallback is not a function:', cb);
      }
    } catch(err) {
      console.error('ERROR in confirm handler:', err.message);
      console.error('Full error:', err);
      console.error('Stack trace:', err.stack);
      App.showToast(err.message || 'An error occurred', 'error');
    }
  });

  document.getElementById('confirm-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeConfirmModal();
  });

  document.addEventListener('click', (e) => {
    const wrapper = document.querySelector('.search-wrapper');
    if (wrapper && !wrapper.contains(e.target)) hideSearchResults();
  });
</script>

</body>
</html>
