<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dive Drills — Progress</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/styles.css?v=5">
  <style>
    /* Profile header */
    .profile-header-card {
      margin-bottom: 24px;
    }
    .profile-header-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .profile-avatar-lg {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-header-info {
      flex: 1;
      min-width: 0;
    }
    .profile-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .profile-diver-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .profile-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.83rem;
      color: var(--text-secondary);
      margin-bottom: 3px;
      flex-wrap: wrap;
    }
    .meta-sep {
      color: var(--border);
      flex-shrink: 0;
    }
    .profile-header-actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .profile-stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .profile-invite-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
      font-size: 0.83rem;
    }
    .profile-invite-label {
      color: var(--text-secondary);
    }
    @media (max-width: 600px) {
      .profile-avatar-lg { width: 60px; height: 60px; font-size: 1.1rem; }
      .profile-header-actions { flex-direction: row; align-items: center; }
    }

    /* Progress levels / skills (unchanged) */
    .level-skills-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .badge-gold   { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
    .badge-silver { background: rgba(156,163,175,.15); color: #9ca3af; border: 1px solid rgba(156,163,175,.3); }
    .badge-bronze { background: rgba(180,120,60,.15);  color: #b47c3c; border: 1px solid rgba(180,120,60,.3); }

    /* Edit modal form layout */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content fade-in">

    <!-- Profile header — rendered by JS for all roles -->
    <div id="profile-header" class="card profile-header-card hidden"></div>

    <!-- Level tabs -->
    <div class="section-title">Select Level</div>
    <div class="level-tabs" id="level-tabs"></div>

    <!-- Level content -->
    <div id="level-content">
      <div class="loading-overlay">
        <div class="loading-spinner loading-spinner-lg"></div>
        <span>Loading skills…</span>
      </div>
    </div>
  </main>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>


<!-- =============================================
     EDIT PROFILE MODAL (coach / super_user only)
============================================= -->
<div class="modal-overlay" id="edit-profile-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h2 class="modal-title">Edit Diver Profile</h2>
      <button class="modal-close" onclick="App.closeModal('edit-profile-modal')">✕</button>
    </div>

    <!-- Super-user-only fields (hidden for regular coaches) -->
    <div id="ep-su-fields" class="hidden">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" id="ep-first-name" class="form-input" placeholder="Jane">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" id="ep-last-name" class="form-input" placeholder="Smith">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="ep-dob" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select id="ep-gender" class="form-select">
            <option value="">Not set</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="divider mb-3"></div>
    </div>

    <!-- Coach-editable fields -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Current Level</label>
        <select id="ep-level" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Diver Group</label>
        <input type="text" id="ep-diver-group" class="form-input" placeholder="e.g. Competitive A">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Assigned Coach Name</label>
      <input type="text" id="ep-coach-name" class="form-input" placeholder="Override roster coach name">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Date</label>
        <input type="date" id="ep-start-date" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">AQUA Group</label>
        <input type="text" id="ep-aqua-group" class="form-input" placeholder="TBD">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Parent Email</label>
        <input type="email" id="ep-parent-email" class="form-input" placeholder="parent@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Parent Phone</label>
        <input type="tel" id="ep-parent-phone" class="form-input" placeholder="(555) 123-4567">
      </div>
    </div>

    <div id="edit-profile-alert" class="alert mb-4"></div>
    <div class="flex gap-3 justify-end">
      <button class="btn btn-ghost" onclick="App.closeModal('edit-profile-modal')">Cancel</button>
      <button class="btn btn-primary" id="btn-save-profile" onclick="saveProfileEdit()">Save</button>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js?v=14"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/skills.js?v=4"></script>
<script src="js/app.js?v=5"></script>

<script>
  let allSkills       = [];
  let completionMap   = {};
  let attemptsBySkill = {};
  let currentUser     = null;
  let targetDiverId   = null;
  let targetDiver     = null;
  let diverCoach      = null;
  let linkedParent    = null;
  let activeLevel     = 0;

  // Display order for skill-type groups within each level.
  const SECTION_ORDER = [
    'Basics', 'Conditioning', 'Flexibility', 'Trampoline', 'Trampoline in Belt',
    'Dryboard', 'Dryboard in Belt', 'Dry Platform', '1m Platform', '1m Platform in Belt',
    '1m Springboard', '3m Springboard', 'Platform', 'Pool', 'Games', 'Bonus',
  ];

  (async function initProgressPage() {
    initSupabase();
    const user = await Auth.init(true);
    if (!user) return;
    currentUser = user;
    App.renderNav(user);

    const diverParam = App.getParam('diver');
    if (user.role === 'coach' || user.role === 'parent') {
      if (!diverParam) {
        window.location.href = 'dashboard.html';
        return;
      }
      targetDiverId = diverParam;
      targetDiver   = await SupabaseDB.getProfileById(diverParam);
    } else {
      targetDiverId = user.id;
      targetDiver   = user;
    }

    const isCoach = user.role === 'coach' || user.role === 'super_user';

    const [skills, cMap, attempts, levelCompMap, coachData, parentData] = await Promise.all([
      Skills.getAll(),
      SupabaseDB.getCompletionMap(targetDiverId),
      SupabaseDB.getAllTestAttempts(targetDiverId),
      SupabaseDB.getLevelCompletions(targetDiverId),
      SupabaseDB.getDiverCoach(targetDiverId),
      isCoach ? SupabaseDB.getLinkedParent(targetDiverId) : Promise.resolve(null),
    ]);

    diverCoach   = coachData;
    linkedParent = parentData;

    allSkills     = skills.filter(s => s.isTestable);
    completionMap = cMap;
    window._levelCompMap = levelCompMap;

    attemptsBySkill = {};
    attempts.forEach(a => {
      (attemptsBySkill[a.skill_id] ??= []).push(a);
    });

    renderProfileHeader();
    updateStats(skills, completionMap);
    buildLevelTabs(skills, completionMap);
    renderLevel(activeLevel);
  })();

  // =============================================
  // PROFILE HEADER
  // =============================================
  function calcAge(dob) {
    if (!dob) return '—';
    const birth = new Date(dob + 'T00:00:00');
    const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  }

  function formatDOB(dob) {
    if (!dob) return '—';
    const [y, m, d] = dob.split('-').map(Number);
    return `${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}/${y}`;
  }

  function diverInviteBadge(status) {
    if (status === 'active')  return '<span class="badge" style="background:rgba(20,184,166,.15);color:#14b8a6;border:1px solid rgba(20,184,166,.3)">✓ Claimed</span>';
    if (status === 'pending') return '<span class="badge" style="background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)">⏳ Invited</span>';
    return '<span class="badge">Not Invited</span>';
  }

  function parentInviteBadge(diver, parent) {
    if (parent) return '<span class="badge" style="background:rgba(20,184,166,.15);color:#14b8a6;border:1px solid rgba(20,184,166,.3)">✓ Claimed</span>';
    if (diver.invite_token && diver.invite_type === 'parent') return '<span class="badge" style="background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)">⏳ Invited</span>';
    return '<span class="badge">Not Invited</span>';
  }

  function renderProfileHeader() {
    const diver       = targetDiver || {};
    const isCoach     = currentUser.role === 'coach' || currentUser.role === 'super_user';
    const hasBackLink = currentUser.role === 'coach' || currentUser.role === 'parent';

    const coachName   = diver.assigned_coach_name || (diverCoach ? diverCoach.full_name : null) || '—';
    const age         = calcAge(diver.date_of_birth);
    const dob         = formatDOB(diver.date_of_birth);
    const diverGroup  = diver.diver_group || '—';
    const aquaGroup   = diver.aqua_group  || 'TBD';
    const startDate   = diver.start_date  ? formatDOB(diver.start_date) : 'Not set';
    const displayName = App.formatNameLastFirst(diver) || diver.full_name || '';

    let parentEmailStr = '—';
    let parentPhoneStr = '—';
    if (isCoach) {
      parentEmailStr = (linkedParent ? linkedParent.email : null) || diver.parent_email || '—';
      parentPhoneStr = (linkedParent ? linkedParent.phone : null) || diver.parent_phone || '—';
    }

    const headerEl = document.getElementById('profile-header');
    headerEl.innerHTML = `
      <div class="profile-header-top">
        <div class="profile-avatar-lg">${Auth.getInitials(diver.full_name || '')}</div>
        <div class="profile-header-info">
          <div class="profile-name-row">
            <h2 class="profile-diver-name">${App.escHtml(displayName)}</h2>
            ${diver.current_level != null
              ? diver.current_level === 0
                ? `<span class="badge badge-secondary">Beginner</span>`
                : `<span class="badge badge-level">L${diver.current_level}</span>`
              : ''}
          </div>
          <div class="profile-meta-row">
            ${age !== '—' ? `<span>Age ${age}</span><span class="meta-sep">·</span>` : ''}
            <span>DOB: ${dob}</span>
          </div>
          <div class="profile-meta-row">
            <span>Group: ${App.escHtml(diverGroup)}</span>
            <span class="meta-sep">·</span>
            <span>AQUA: ${App.escHtml(aquaGroup)}</span>
          </div>
          <div class="profile-meta-row">
            <span>Coach: ${App.escHtml(coachName)}</span>
            <span class="meta-sep">·</span>
            <span>Start: ${startDate}</span>
          </div>
          ${isCoach ? `
            <div class="profile-meta-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
              <span style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary)">Parent</span>
              <span class="meta-sep">·</span>
              <span>${App.escHtml(parentEmailStr)}</span>
              ${parentPhoneStr !== '—' ? `<span class="meta-sep">·</span><span>${App.escHtml(parentPhoneStr)}</span>` : ''}
            </div>
          ` : ''}
        </div>
        <div class="profile-header-actions">
          ${hasBackLink ? '<a href="roster.html" class="btn btn-ghost btn-sm">← Roster</a>' : ''}
          ${isCoach ? '<button class="btn btn-secondary btn-sm" onclick="openEditProfileModal()">Edit</button>' : ''}
        </div>
      </div>
      <div class="profile-stats-row">
        <div class="stat-card">
          <div class="stat-value" style="color:#3b82f6" id="stat-attained">—</div>
          <div class="stat-label">Skill Attained</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--pending)" id="stat-ready">—</div>
          <div class="stat-label">Ready for Test</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-certified">—</div>
          <div class="stat-label">Certified</div>
        </div>
      </div>
      <div class="profile-invite-row">
        <span class="profile-invite-label">Diver:</span>
        ${diverInviteBadge(diver.status)}
        <span class="profile-invite-label" style="margin-left:10px">Parent:</span>
        ${parentInviteBadge(diver, linkedParent)}
      </div>
    `;
    headerEl.classList.remove('hidden');
  }

  // =============================================
  // EDIT PROFILE MODAL
  // =============================================
  function openEditProfileModal() {
    if (!targetDiver) return;
    const d           = targetDiver;
    const isSuperUser = currentUser.role === 'super_user';

    document.getElementById('ep-su-fields').classList.toggle('hidden', !isSuperUser);
    if (isSuperUser) {
      document.getElementById('ep-first-name').value = d.first_name    || '';
      document.getElementById('ep-last-name').value  = d.last_name     || '';
      document.getElementById('ep-dob').value        = d.date_of_birth || '';
      document.getElementById('ep-gender').value     = d.gender        || '';
    }

    const lvlSel = document.getElementById('ep-level');
    if (!lvlSel.options.length) {
      for (let i = 0; i <= 12; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i === 0 ? 'Level 0 — Beginner' : `Level ${i}`;
        lvlSel.appendChild(opt);
      }
    }

    lvlSel.value = d.current_level != null ? String(d.current_level) : '0';
    document.getElementById('ep-diver-group').value  = d.diver_group          || '';
    document.getElementById('ep-coach-name').value   = d.assigned_coach_name  || '';
    document.getElementById('ep-start-date').value   = d.start_date           || '';
    document.getElementById('ep-aqua-group').value   = (d.aqua_group && d.aqua_group !== 'TBD') ? d.aqua_group : '';
    document.getElementById('ep-parent-email').value = d.parent_email         || '';
    document.getElementById('ep-parent-phone').value = d.parent_phone         || '';
    document.getElementById('edit-profile-alert').className = 'alert mb-4';

    App.openModal('edit-profile-modal');
  }

  async function saveProfileEdit() {
    const btn       = document.getElementById('btn-save-profile');
    const alertEl   = document.getElementById('edit-profile-alert');
    const isSuperUser = currentUser.role === 'super_user';

    alertEl.className = 'alert mb-4';
    App.setBtnLoading(btn, true);
    try {
      const level = document.getElementById('ep-level').value;
      const updates = {
        currentLevel:      level !== '' ? parseInt(level, 10) : null,
        diverGroup:        document.getElementById('ep-diver-group').value.trim()  || null,
        assignedCoachName: document.getElementById('ep-coach-name').value.trim()   || null,
        startDate:         document.getElementById('ep-start-date').value          || null,
        parentEmail:       document.getElementById('ep-parent-email').value.trim() || null,
        parentPhone:       document.getElementById('ep-parent-phone').value.trim() || null,
        aquaGroup:         document.getElementById('ep-aqua-group').value.trim()   || null,
      };

      if (isSuperUser) {
        const firstName = document.getElementById('ep-first-name').value.trim();
        const lastName  = document.getElementById('ep-last-name').value.trim();
        await SupabaseDB.updateProfile(targetDiverId, {
          first_name:          firstName || null,
          last_name:           lastName  || null,
          full_name:           [firstName, lastName].filter(Boolean).join(' ') || null,
          date_of_birth:       document.getElementById('ep-dob').value    || null,
          gender:              document.getElementById('ep-gender').value  || null,
          current_level:       updates.currentLevel,
          diver_group:         updates.diverGroup,
          assigned_coach_name: updates.assignedCoachName,
          start_date:          updates.startDate,
          parent_email:        updates.parentEmail,
          parent_phone:        updates.parentPhone,
          aqua_group:          updates.aquaGroup,
        });
      } else {
        await SupabaseDB.updateDiverProfileByCoach(targetDiverId, updates);
      }

      targetDiver = await SupabaseDB.getProfileById(targetDiverId);
      App.closeModal('edit-profile-modal');
      App.showToast('Profile updated.');
      renderProfileHeader();
      updateStats(allSkills, completionMap);
    } catch (err) {
      alertEl.className   = 'alert alert-error visible mb-4';
      alertEl.textContent = err.message;
    } finally {
      App.setBtnLoading(btn, false);
    }
  }

  document.getElementById('edit-profile-modal').addEventListener('click', function(e) {
    if (e.target === this) App.closeModal('edit-profile-modal');
  });

  // =============================================
  // PERMISSIONS
  // =============================================
  function canSetStage1() {
    if (currentUser.role === 'coach') return true;
    return currentUser.role === 'diver' && targetDiverId === currentUser.id;
  }
  function canSetStage23() {
    return currentUser.role === 'coach';
  }

  // =============================================
  // STATS / TABS / LEVEL HEADER
  // =============================================
  function updateStats(skills, cMap) {
    const completions = skills.map(s => cMap[s.id]).filter(Boolean);
    const attained   = completions.filter(c => c.skill_attained).length;
    const ready      = completions.filter(c => c.ready_for_test).length;
    const certified  = completions.filter(c => c.tested_and_passed).length;
    document.getElementById('stat-attained').textContent  = attained;
    document.getElementById('stat-ready').textContent     = ready;
    document.getElementById('stat-certified').textContent = certified;
  }

  function levelStats(level) {
    const lvlSkills  = allSkills.filter(s => s.level === level);
    const total      = lvlSkills.length;
    const attained   = lvlSkills.filter(s => completionMap[s.id]?.skill_attained).length;
    const ready      = lvlSkills.filter(s => completionMap[s.id]?.ready_for_test).length;
    const certified  = lvlSkills.filter(s => completionMap[s.id]?.tested_and_passed).length;
    const pct        = App.calcProgress(certified, total);
    return { total, attained, ready, certified, pct };
  }

  function buildLevelTabs(skills, cMap) {
    const levels = Skills.uniqueLevels(skills);
    const tabsEl = document.getElementById('level-tabs');

    tabsEl.innerHTML = levels.map(lvl => {
      const lvlSkills  = skills.filter(s => s.level === lvl);
      const certified  = lvlSkills.filter(s => cMap[s.id]?.tested_and_passed).length;
      const attained   = lvlSkills.filter(s => cMap[s.id]?.skill_attained).length;
      const isComplete = certified === lvlSkills.length && lvlSkills.length > 0;
      const isPartial  = !isComplete && attained > 0;

      let cls = '';
      if (isComplete) cls = 'complete';
      else if (isPartial) cls = 'partial';

      return `
        <button
          class="level-tab ${cls} ${lvl === activeLevel ? 'active' : ''}"
          data-level="${lvl}"
          onclick="selectLevel(${lvl})">
          ${lvl === 0 ? 'L0' : `L${lvl}`}
        </button>
      `;
    }).join('');
  }

  function selectLevel(level) {
    activeLevel = level;
    document.querySelectorAll('.level-tab').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.level) === level);
    });
    renderLevel(level);
  }

  function updateLevelHeader(level) {
    if (level !== activeLevel) return;
    const { total, attained, ready, certified, pct } = levelStats(level);

    const fill        = document.getElementById('level-progress-fill');
    const pctEl       = document.getElementById('level-progress-pct');
    const countEl     = document.getElementById('level-cert-count');
    const breakdownEl = document.getElementById('level-breakdown');

    if (fill) {
      fill.style.width = `${pct}%`;
      fill.classList.toggle('partial', pct > 0 && pct < 100);
    }
    if (pctEl)       pctEl.textContent = `${pct}%`;
    if (countEl)     countEl.textContent = `${certified}/${total} certified`;
    if (breakdownEl) breakdownEl.textContent = `${attained} attained · ${ready} ready for test · ${certified} certified`;
  }

  function renderLevel(level) {
    const container = document.getElementById('level-content');
    const lvlSkills  = allSkills.filter(s => s.level === level);

    if (!lvlSkills.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><p>No skills found for this level.</p></div>`;
      return;
    }

    const { total, attained, ready, certified, pct } = levelStats(level);
    const groups = groupSkillsByType(lvlSkills);

    const levelComp = (window._levelCompMap || {})[level];
    const desigBadge = levelComp?.designation
      ? levelDesignationBadge(levelComp.designation)
      : '';

    container.innerHTML = `
      <div class="card fade-in">
        <div class="level-skills-header">
          <div>
            <div class="flex items-center gap-2">
              <h3>${App.getLevelLabel(level)}</h3>
              ${desigBadge}
            </div>
            <div class="text-sm text-secondary mt-1" id="level-breakdown">
              ${attained} attained · ${ready} ready for test · ${certified} certified
            </div>
          </div>
          <div class="flex flex-col items-end gap-1">
            <div class="text-accent" style="font-size:1.5rem;font-weight:800" id="level-progress-pct">${pct}%</div>
            <div class="level-cert-count" id="level-cert-count">${certified}/${total} certified</div>
          </div>
        </div>
        <div class="progress-bar-wrap mb-4">
          <div class="progress-bar-fill ${pct > 0 && pct < 100 ? 'partial' : ''}" id="level-progress-fill"
               style="width: ${pct}%"></div>
        </div>
        <div>
          ${groups.map(g => buildTypeGroup(level, g.type, g.skills)).join('')}
        </div>
      </div>
    `;

    container.querySelectorAll('.skill-thumb').forEach(thumb => {
      thumb.addEventListener('click', (e) => {
        e.stopPropagation();
        App.openImageLightbox(thumb.dataset.lightboxUrl);
      });
    });
  }

  // ---- Group a level's skills by skill type, in standardized order ----
  function groupSkillsByType(skills) {
    const byType = {};
    skills.forEach(skill => {
      const type = skill.type || 'General';
      (byType[type] ??= []).push(skill);
    });

    const orderedTypes = [
      ...SECTION_ORDER.filter(t => byType[t]),
      ...Object.keys(byType).filter(t => !SECTION_ORDER.includes(t)).sort(),
    ];

    return orderedTypes.map(type => ({
      type,
      skills: byType[type].slice().sort((a, b) => App.compareSkillOrder(a, b)),
    }));
  }

  function typeSlug(type) {
    return (type || 'general').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-+|-+$)/g, '');
  }

  function typeGroupStats(level, type) {
    const skills    = allSkills.filter(s => s.level === level && (s.type || 'General') === type);
    const total     = skills.length;
    const certified = skills.filter(s => completionMap[s.id]?.tested_and_passed).length;
    const pct       = App.calcProgress(certified, total);
    return { total, certified, pct };
  }

  function buildTypeGroup(level, type, skills) {
    const { total, certified, pct } = typeGroupStats(level, type);
    const slug = typeSlug(type);

    return `
      <div class="skill-type-group">
        <div class="skill-type-group-header">
          <span class="skill-type-group-name">${App.escHtml(type)}</span>
          <span class="skill-type-group-progress">
            <span class="text-xs text-secondary" id="type-progress-count-${slug}">${certified}/${total}</span>
            <div class="progress-bar-wrap progress-bar-wrap-sm">
              <div class="progress-bar-fill ${pct > 0 && pct < 100 ? 'partial' : ''}" id="type-progress-fill-${slug}"
                   style="width: ${pct}%"></div>
            </div>
          </span>
        </div>
        ${skills.map(buildSkillRow).join('')}
      </div>
    `;
  }

  function updateTypeGroupHeader(level, type) {
    if (level !== activeLevel) return;
    const { total, certified, pct } = typeGroupStats(level, type);
    const slug = typeSlug(type);

    const fill  = document.getElementById(`type-progress-fill-${slug}`);
    const count = document.getElementById(`type-progress-count-${slug}`);
    if (fill) {
      fill.style.width = `${pct}%`;
      fill.classList.toggle('partial', pct > 0 && pct < 100);
    }
    if (count) count.textContent = `${certified}/${total}`;
  }

  // =============================================
  // SKILL ROW — three stage indicators + test panel
  // =============================================
  function buildSkillRow(skill) {
    const completion = completionMap[skill.id] || {};
    const attempts    = attemptsBySkill[skill.id] || [];
    const mostRecent  = attempts[0];

    const stage1Filled = !!completion.skill_attained;
    const stage2Filled = !!completion.ready_for_test;
    const stage3Filled = !!completion.tested_and_passed;

    const locked = stage3Filled;

    const stage1Disabled = !canSetStage1() || locked;
    const stage2Disabled = !canSetStage23() || !stage1Filled || locked;
    const stage3Disabled = !(stage1Filled && stage2Filled);

    const stage1Click = stage1Disabled ? '' : `onclick="toggleStage1(${skill.id})"`;
    const stage2Click = stage2Disabled ? '' : `onclick="toggleStage2(${skill.id})"`;
    const stage3Click = stage3Disabled ? '' : `onclick="toggleTestPanel(${skill.id})"`;

    const harnessIcon = skill.requiresHarness
      ? '<span class="harness-icon" title="Requires harness">🦺</span>'
      : '';

    const latestScore = completion.latest_score ?? mostRecent?.score ?? null;
    const latestDate  = completion.latest_test_date ?? mostRecent?.test_date ?? null;
    const recentHtml  = latestScore !== null
      ? `<span class="text-xs text-secondary">Last test: ${formatDateOnly(latestDate)} · Score ${Number(latestScore).toFixed(1)}</span>`
      : '';

    return `
      <div class="skill-row" id="skill-row-${skill.id}">
        <div class="skill-row-main">
          ${skill.photoUrl
            ? `<img class="skill-thumb" src="${App.escHtml(skill.photoUrl)}" alt="" loading="lazy" data-lightbox-url="${App.escHtml(skill.photoUrl)}">`
            : ''}
          <div class="skill-row-info">
            <div class="skill-row-name">${App.escHtml(skill.name)}${harnessIcon}</div>
            <div class="flex gap-2 mt-1 flex-wrap items-center">
              <span class="badge badge-secondary">${App.escHtml(skill.type)}</span>
              ${recentHtml}
            </div>
          </div>
          <div class="stage-indicators">
            <button class="stage-circle stage-1 ${stage1Filled ? 'filled' : ''} ${stage1Disabled ? 'disabled' : ''}"
              title="Stage 1: Skill Attained" ${stage1Click}>${stage1Filled ? '✓' : '1'}</button>
            <button class="stage-circle stage-2 ${stage2Filled ? 'filled' : ''} ${stage2Disabled ? 'disabled' : ''}"
              title="Stage 2: Ready for Test" ${stage2Click}>${stage2Filled ? '✓' : '2'}</button>
            <button class="stage-circle stage-3 ${stage3Filled ? 'filled' : ''} ${stage3Disabled ? 'disabled' : ''}"
              title="Stage 3: Tested &amp; Passed" ${stage3Click}>${stage3Filled ? '✓' : '3'}</button>
          </div>
        </div>
        <div class="test-panel" id="test-panel-${skill.id}">
          <div class="test-panel-inner">
            ${buildTestPanelInner(skill, completion, attempts)}
          </div>
        </div>
      </div>
    `;
  }

  function buildTestPanelInner(skill, completion, attempts) {
    const canScore = currentUser.role === 'coach' && completion.skill_attained && completion.ready_for_test;
    const today = new Date().toISOString().slice(0, 10);

    const formHtml = canScore ? `
      <div class="form-group">
        <label class="form-label">Score (0–10)</label>
        <select id="test-score-${skill.id}" class="form-select">
          <option value="" disabled selected>Select score…</option>
          ${scoreOptionsHtml()}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Test Date</label>
        <input type="date" id="test-date-${skill.id}" class="form-input" value="${today}">
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea id="test-notes-${skill.id}" class="form-input" rows="2" style="resize:vertical"
          placeholder="Coaching notes about this attempt…"></textarea>
      </div>
      <button class="btn btn-primary btn-sm" id="test-submit-${skill.id}" onclick="submitTestAttempt(${skill.id})">Submit Test</button>
      <div class="divider mt-4 mb-2"></div>
    ` : '';

    const attemptsHtml = attempts.length
      ? `
        <div class="text-sm" style="font-weight:600">Previous Attempts</div>
        <table class="attempts-table">
          <thead><tr><th>Date</th><th>Score</th><th>Notes</th></tr></thead>
          <tbody>
            ${attempts.map(a => `
              <tr>
                <td>${formatDateOnly(a.test_date)}</td>
                <td>${Number(a.score).toFixed(1)}</td>
                <td>${App.escHtml(a.notes || '—')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `
      : '<p class="text-secondary text-sm">No test attempts recorded yet.</p>';

    return formHtml + attemptsHtml;
  }

  function levelDesignationBadge(designation) {
    if (designation === 'gold')   return '<span class="badge badge-gold">🥇 Gold</span>';
    if (designation === 'silver') return '<span class="badge badge-silver">🥈 Silver</span>';
    if (designation === 'bronze') return '<span class="badge badge-bronze">🥉 Bronze</span>';
    return '';
  }

  function scoreOptionsHtml() {
    let html = '';
    for (let i = 0; i <= 20; i++) {
      const val = (i * 0.5).toFixed(1);
      html += `<option value="${val}">${val}</option>`;
    }
    return html;
  }

  // Format a plain YYYY-MM-DD date string without timezone shift.
  function formatDateOnly(dateStr) {
    if (!dateStr) return '—';
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
    });
  }

  function toggleTestPanel(skillId) {
    const panel = document.getElementById(`test-panel-${skillId}`);
    if (panel) panel.classList.toggle('open');
  }

  function refreshSkillRow(skill, keepOpen = false) {
    const panelEl = document.getElementById(`test-panel-${skill.id}`);
    const wasOpen = keepOpen || panelEl?.classList.contains('open');

    const row = document.getElementById(`skill-row-${skill.id}`);
    if (row) {
      row.outerHTML = buildSkillRow(skill);
      if (wasOpen) document.getElementById(`test-panel-${skill.id}`)?.classList.add('open');
    }

    updateLevelHeader(skill.level);
    updateTypeGroupHeader(skill.level, skill.type || 'General');
    buildLevelTabs(allSkills, completionMap);
    updateStats(allSkills, completionMap);
  }

  // =============================================
  // STAGE ACTIONS
  // =============================================
  async function toggleStage1(skillId) {
    const skill      = allSkills.find(s => s.id === skillId);
    const completion = completionMap[skillId] || {};
    try {
      const updated = await SupabaseDB.setSkillAttained(targetDiverId, skillId, currentUser.id, !completion.skill_attained);
      completionMap[skillId] = updated;
      refreshSkillRow(skill);
      App.showToast(updated.skill_attained ? 'Skill marked as attained!' : 'Skill attained status removed.');
    } catch (err) {
      App.showToast(err.message, 'error');
    }
  }

  async function toggleStage2(skillId) {
    const skill      = allSkills.find(s => s.id === skillId);
    const completion = completionMap[skillId] || {};
    if (!completion.skill_attained) {
      App.showToast('Stage 1 (Skill Attained) must be set first.', 'error');
      return;
    }
    try {
      const updated = await SupabaseDB.setReadyForTest(targetDiverId, skillId, currentUser.id, !completion.ready_for_test);
      completionMap[skillId] = updated;
      refreshSkillRow(skill);
      App.showToast(updated.ready_for_test ? 'Marked ready for test!' : 'Ready for test status removed.');
    } catch (err) {
      App.showToast(err.message, 'error');
    }
  }

  async function submitTestAttempt(skillId) {
    const skill      = allSkills.find(s => s.id === skillId);
    const completion = completionMap[skillId];
    const scoreEl = document.getElementById(`test-score-${skillId}`);
    const dateEl  = document.getElementById(`test-date-${skillId}`);
    const notesEl = document.getElementById(`test-notes-${skillId}`);
    const btn     = document.getElementById(`test-submit-${skillId}`);

    const score = scoreEl.value;
    const date  = dateEl.value;
    const notes = notesEl.value.trim();

    if (score === '') { App.showToast('Please select a score.', 'error'); return; }
    if (!date)        { App.showToast('Please select a test date.', 'error'); return; }

    App.setBtnLoading(btn, true);
    try {
      const { attempt, completion: updatedCompletion } = await SupabaseDB.recordTestAttempt({
        skillCompletionId: completion.id,
        diverId:           targetDiverId,
        skillId,
        coachId:           currentUser.id,
        score:             parseFloat(score),
        testDate:          date,
        notes,
      });

      completionMap[skillId] = updatedCompletion;
      attemptsBySkill[skillId] = [attempt, ...(attemptsBySkill[skillId] || [])]
        .sort((a, b) => b.test_date.localeCompare(a.test_date) || b.created_at.localeCompare(a.created_at));

      refreshSkillRow(skill, true);
      App.showToast('Test attempt recorded!');
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }
</script>

</body>
</html>
