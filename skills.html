<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dive Drills — Skills Library</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/styles.css?v=5">
</head>
<body>

<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content fade-in">
    <div class="page-header">
      <h1>Skills Library</h1>
      <p>Browse all skills across Levels 0–12. Tap a skill for details.</p>
    </div>

    <!-- Curriculum / Supplemental tabs + Create Skill (coach only) -->
    <div class="skills-toolbar">
      <div class="skill-view-toggle" id="skill-tabs">
        <button class="skill-view-btn active" data-tab="curriculum" onclick="selectTab('curriculum')">Testing Skills</button>
        <button class="skill-view-btn" data-tab="supplemental" onclick="selectTab('supplemental')">Supplemental Skills</button>
      </div>
      <button class="btn btn-primary hidden" id="create-skill-btn" onclick="openCreateSkillModal()">+ Create Skill</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" class="form-input" placeholder="Search skills…">
      </div>
      <select id="filter-level" class="form-select">
        <option value="">All Levels</option>
      </select>
      <select id="filter-type" class="form-select">
        <option value="">All Types</option>
      </select>
    </div>

    <!-- Results count -->
    <div class="flex items-center justify-between mb-4">
      <span id="result-count" class="text-sm text-secondary"></span>
      <button id="clear-filters" class="btn btn-ghost btn-sm hidden">Clear Filters</button>
    </div>

    <!-- Skills list -->
    <div id="skills-container">
      <div class="loading-overlay">
        <div class="loading-spinner loading-spinner-lg"></div>
        <span>Loading skills…</span>
      </div>
    </div>
  </main>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- Skill Detail Modal -->
<div class="modal-overlay" id="skill-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div>
        <h2 class="modal-title" id="modal-skill-name">Skill Name</h2>
        <div id="modal-skill-meta" class="skill-meta mt-1"></div>
      </div>
      <button class="modal-close" onclick="App.closeModal('skill-modal')" aria-label="Close">✕</button>
    </div>

    <div id="skill-detail-view">
      <div id="modal-skill-order" class="text-secondary mb-3" style="font-size:0.7rem"></div>

      <div id="modal-status-badge" class="mb-4"></div>

      <div class="content-section">
        <div class="section-title mb-2">Description</div>
        <div id="modal-description" class="text-sm text-secondary" style="line-height:1.6"></div>
      </div>

      <div id="modal-coaching" class="content-section hidden">
        <div class="section-title mb-2">Coaching Notes</div>
        <div id="modal-coaching-text" class="text-sm text-secondary" style="line-height:1.6"></div>
      </div>

      <div id="modal-photo" class="content-section hidden">
        <div class="section-title mb-2">Photo</div>
        <img id="modal-photo-img" alt="" class="modal-photo-full">
      </div>

      <div id="modal-video" class="content-section hidden">
        <div class="section-title mb-2">Video</div>
        <div id="modal-video-name" class="text-sm mb-2" style="font-weight:600"></div>
        <video id="modal-video-player" class="modal-video-player" controls playsinline></video>
      </div>

      <div class="divider"></div>

      <div id="modal-action-area"></div>
    </div>

    <div id="skill-edit-form" class="hidden"></div>
  </div>
</div>

<!-- Create Skill Modal (coach only) -->
<div class="modal-overlay" id="create-skill-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2 class="modal-title">Create Skill</h2>
      <button class="modal-close" onclick="closeCreateSkillModal()" aria-label="Close">✕</button>
    </div>

    <div id="create-skill-alert" class="alert mb-3"></div>

    <div class="form-group">
      <label class="form-label">Skill Name *</label>
      <input type="text" id="create-skill-name" class="form-input" placeholder="e.g. Forward Dive Pike">
    </div>

    <div class="form-group">
      <label class="form-label">Skill Type *</label>
      <select id="create-skill-type" class="form-select" style="width:100%">
        <option value="">Select a type…</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Skill Category</label>
      <select id="create-skill-category" class="form-select" style="width:100%">
        <option value="">None / Not applicable</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Skill Level</label>
      <input type="number" id="create-skill-level" class="form-input" min="0" max="12" value="0">
    </div>

    <input type="hidden" id="create-skill-order" value="10000">

    <div class="form-group">
      <label class="form-label">Skill Description</label>
      <textarea id="create-skill-description" class="form-input" rows="3" style="resize:vertical"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Photo URL</label>
      <input type="url" id="create-skill-photo-url" class="form-input" placeholder="https://media.divedrills.com/dive-photos/skill-name.jpg">
      <div id="create-skill-photo-preview" class="mt-2"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Video URL</label>
      <input type="url" id="create-skill-video-url" class="form-input" placeholder="https://media.divedrills.com/dive-videos/skill-name.mp4">
      <div id="create-skill-video-status" class="text-sm mt-1"></div>
    </div>

    <div class="flex gap-2 mt-2">
      <button class="btn btn-primary" id="create-skill-submit-btn" onclick="submitCreateSkill()">Create Skill</button>
      <button class="btn btn-ghost" onclick="closeCreateSkillModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js?v=4"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/skills.js?v=3"></script>
<script src="js/app.js?v=3"></script>

<script>
  let allSkills     = [];
  let completionMap = {};
  let currentUser   = null;
  let activeSkill   = null;
  let activeTab     = 'curriculum';

  // Display order for skill-type sections on the library page.
  const SECTION_ORDER = [
    'Basics', 'Conditioning', 'Flexibility', 'Trampoline', 'Trampoline in Belt',
    'Dryboard', 'Dryboard in Belt', 'Dry Platform', '1m Platform', '1m Platform in Belt',
    '1m Springboard', '3m Springboard', 'Platform', 'Pool', 'Games', 'Bonus',
  ];

  // Standardized skill category options (Create/Edit Skill forms).
  const SKILL_CATEGORIES = ['Forward', 'Back', 'Reverse', 'Inward', 'Twist', 'Armstand'];

  (async function initSkillsPage() {
    initSupabase();
    const user = await Auth.init(true);
    if (!user) return;
    currentUser = user;
    App.renderNav(user);

    const [skills, cMap] = await Promise.all([
      fetchSkills(),
      (user.role === 'diver') ? SupabaseDB.getCompletionMap(user.id) : Promise.resolve({}),
    ]);

    allSkills     = skills;
    completionMap = cMap;

    if (user.role === 'coach') {
      document.getElementById('create-skill-btn').classList.remove('hidden');
      populateSkillTypeOptions();
    }

    if (skills.length === 0) return;

    populateFilters(skills);
    applyFilters();
    attachFilterListeners();
  })();

  async function fetchSkills() {
    try {
      return await Skills.getAll();
    } catch (err) {
      App.showError('skills-container', `Could not load skills: ${err.message}`);
      return [];
    }
  }

  function populateFilters(skills) {
    const levelSel = document.getElementById('filter-level');
    const typeSel  = document.getElementById('filter-type');

    Skills.uniqueLevels(skills).forEach(lvl => {
      const opt = document.createElement('option');
      opt.value = lvl;
      opt.textContent = `Level ${lvl}`;
      levelSel.appendChild(opt);
    });

    const presentTypes = new Set(skills.map(s => s.type));
    SECTION_ORDER.filter(t => presentTypes.has(t)).forEach(t => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = t;
      typeSel.appendChild(opt);
    });
  }

  function attachFilterListeners() {
    ['search', 'filter-level', 'filter-type'].forEach(id => {
      document.getElementById(id).addEventListener('input', applyFilters);
    });
    document.getElementById('clear-filters').addEventListener('click', () => {
      document.getElementById('search').value       = '';
      document.getElementById('filter-level').value = '';
      document.getElementById('filter-type').value  = '';
      applyFilters();
    });
  }

  function selectTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.skill-view-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    applyFilters();
  }

  function applyFilters() {
    const search = document.getElementById('search').value;
    const level  = document.getElementById('filter-level').value;
    const type   = document.getElementById('filter-type').value;

    const tabSkills = allSkills.filter(s => activeTab === 'curriculum' ? s.isTestable : !s.isTestable);
    const filtered  = Skills.filterSkills(tabSkills, { level, type, search });
    renderSkills(filtered);

    const hasFilters = search || level || type;
    document.getElementById('clear-filters').classList.toggle('hidden', !hasFilters);
  }

  function renderSkills(skills) {
    const container = document.getElementById('skills-container');
    const countEl   = document.getElementById('result-count');

    countEl.textContent = `${skills.length} skill${skills.length !== 1 ? 's' : ''}`;

    if (skills.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <p>No skills match your filters. Try adjusting your search.</p>
        </div>
      `;
      return;
    }

    const byType = {};
    skills.forEach(skill => {
      const type = skill.type || 'General';
      (byType[type] ??= []).push(skill);
    });

    // Known types first (in the standardized order), then any leftover
    // types not in the list, alphabetically — sections with no skills
    // are simply never built.
    const orderedTypes = [
      ...SECTION_ORDER.filter(t => byType[t]),
      ...Object.keys(byType).filter(t => !SECTION_ORDER.includes(t)).sort(),
    ];

    container.innerHTML = orderedTypes.map(type => buildSection(type, byType[type])).join('');

    container.querySelectorAll('.skill-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.skill-thumb')) return;
        const skill = allSkills.find(s => s.id === Number(card.dataset.skillId));
        if (skill) openSkillModal(skill);
      });
    });

    container.querySelectorAll('.skill-thumb').forEach(thumb => {
      thumb.addEventListener('click', (e) => {
        e.stopPropagation();
        App.openImageLightbox(thumb.dataset.lightboxUrl);
      });
    });
  }

  function buildSection(type, skillsInType) {
    const byLevel = {};
    skillsInType.forEach(skill => {
      const lvl = skill.level ?? 0;
      (byLevel[lvl] ??= []).push(skill);
    });

    const levels = Object.keys(byLevel).map(Number).sort((a, b) => a - b);

    const levelGroupsHtml = levels.map(lvl => {
      const sorted = byLevel[lvl].slice().sort((a, b) => App.compareSkillOrder(a, b));
      return `
        <div class="skill-level-group">
          <div class="skill-level-label">Level ${lvl}</div>
          <div class="skills-list">${sorted.map(buildSkillCard).join('')}</div>
        </div>
      `;
    }).join('');

    return `
      <section class="skill-section">
        <div class="skill-section-header">
          <span>${App.escHtml(type)}</span>
          <span class="skill-section-count">${skillsInType.length}</span>
        </div>
        ${levelGroupsHtml}
      </section>
    `;
  }

  function buildSkillCard(skill) {
    const completion = completionMap[skill.id];
    const status     = App.stageStatus(completion);
    const cardClass  = status === 'none' ? '' : status;

    return `
      <div class="skill-card ${cardClass}" data-skill-id="${skill.id}" role="button" tabindex="0">
        <div class="skill-card-body">
          ${skill.photoUrl
            ? `<img class="skill-thumb" src="${App.escHtml(skill.photoUrl)}" alt="" loading="lazy" data-lightbox-url="${App.escHtml(skill.photoUrl)}">`
            : ''}
          <div class="skill-card-content">
            <div class="skill-card-header">
              <div class="skill-name">${App.escHtml(skill.name)}${skill.requiresHarness ? ' <span title="Requires harness">+</span>' : ''}</div>
              ${App.stageBadgeHtml(completion)}
            </div>
            ${skill.description
              ? `<div class="skill-description">${App.escHtml(skill.description.slice(0, 100))}${skill.description.length > 100 ? '…' : ''}</div>`
              : ''}
            <div class="skill-meta">
              <span class="badge badge-level">L${skill.level ?? '?'}</span>
              <span class="badge badge-secondary">${App.escHtml(skill.type)}</span>
              ${skill.videoUrl ? '<span class="badge badge-accent">▶ Video</span>' : ''}
              ${skill.requiresHarness ? '<span class="badge badge-secondary">+ Harness</span>' : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function openSkillModal(skill) {
    activeSkill = skill;
    const completion = completionMap[skill.id];

    document.getElementById('modal-skill-name').textContent = skill.name;

    const testBadge = skill.isTestable
      ? '<span class="badge badge-accent">Testing Skill</span>'
      : '<span class="badge badge-secondary">Supplemental Skill</span>';

    document.getElementById('modal-skill-meta').innerHTML = `
      <span class="badge badge-level">Level ${skill.level ?? '?'}</span>
      <span class="badge badge-secondary">${App.escHtml(skill.type)}</span>
      ${skill.category ? `<span class="badge badge-secondary">${App.escHtml(skill.category)}</span>` : ''}
      ${testBadge}
      ${skill.requiresHarness ? '<span class="badge badge-secondary">+ Harness Required</span>' : ''}
    `;

    document.getElementById('modal-skill-order').textContent = `Skill Order: ${skill.order ?? '—'}`;

    document.getElementById('modal-status-badge').innerHTML = App.stageBadgeHtml(completion) || '';
    document.getElementById('modal-description').textContent = skill.description || 'No description available.';

    const coachingWrap = document.getElementById('modal-coaching');
    if (skill.coachingNotes) {
      document.getElementById('modal-coaching-text').textContent = skill.coachingNotes;
      coachingWrap.classList.remove('hidden');
    } else {
      coachingWrap.classList.add('hidden');
    }

    const photoWrap = document.getElementById('modal-photo');
    if (skill.photoUrl) {
      document.getElementById('modal-photo-img').src = skill.photoUrl;
      photoWrap.classList.remove('hidden');
    } else {
      photoWrap.classList.add('hidden');
    }

    const videoWrap   = document.getElementById('modal-video');
    const videoPlayer = document.getElementById('modal-video-player');
    if (skill.videoUrl) {
      document.getElementById('modal-video-name').textContent = skill.name;
      videoPlayer.src = skill.videoUrl;
      videoWrap.classList.remove('hidden');
    } else {
      videoPlayer.removeAttribute('src');
      videoWrap.classList.add('hidden');
    }

    renderModalActions(skill, completion);
    showSkillDetailView();
    App.openModal('skill-modal');
  }

  // Toggle between the read-only detail view and the edit form.
  function showSkillDetailView() {
    document.getElementById('skill-detail-view').classList.remove('hidden');
    document.getElementById('skill-edit-form').classList.add('hidden');
  }
  function showSkillEditView() {
    document.getElementById('skill-detail-view').classList.add('hidden');
    document.getElementById('skill-edit-form').classList.remove('hidden');
  }

  function renderModalActions(skill, completion) {
    const area = document.getElementById('modal-action-area');

    if (currentUser.role === 'diver') {
      const status = App.stageStatus(completion);
      if (status === 'certified') {
        area.innerHTML = `<p class="text-secondary text-sm" style="text-align:center">✅ Tested and passed</p>`;
      } else if (status === 'ready') {
        area.innerHTML = `<p class="text-pending text-sm" style="text-align:center">⏳ Ready for testing — your coach will test this skill soon.</p>`;
      } else if (status === 'attained') {
        area.innerHTML = `
          <p class="text-secondary text-sm" style="text-align:center">Marked as attained on ${App.formatDate(completion.skill_attained_at)}.</p>
          <a href="progress.html" class="btn btn-secondary btn-full mt-2">View on Progress page</a>
        `;
      } else {
        area.innerHTML = `
          <p class="text-secondary text-sm mb-2" style="text-align:center">Mark this skill as attained from your Progress page once you can perform it.</p>
          <a href="progress.html" class="btn btn-primary btn-full">Go to Progress</a>
        `;
      }
    } else if (currentUser.role === 'coach') {
      area.innerHTML = `<button class="btn btn-primary btn-full" onclick="openSkillEditForm(${skill.id})">Edit Skill</button>`;
    } else {
      area.innerHTML = '';
    }
  }

  // =============================================
  // COACH — EDIT SKILL
  // =============================================
  function openSkillEditForm(skillId) {
    const skill = allSkills.find(s => s.id === skillId);
    if (!skill) return;

    const form = document.getElementById('skill-edit-form');
    form.innerHTML = `
      <div class="flex items-center justify-between mb-3">
        <h3>Edit Skill</h3>
        <button class="btn btn-ghost btn-sm" onclick="showSkillDetailView()">Cancel</button>
      </div>
      <div class="form-group">
        <label class="form-label">Skill Name *</label>
        <input type="text" id="edit-skill-name" class="form-input" value="${App.escHtml(skill.name)}">
      </div>
      <div class="form-group">
        <label class="form-label">Skill Type *</label>
        <select id="edit-skill-type" class="form-select" style="width:100%">
          ${SECTION_ORDER.map(type => `<option value="${type}" ${skill.type === type ? 'selected' : ''}>${type}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Skill Category</label>
        <select id="edit-skill-category" class="form-select" style="width:100%">
          <option value="">None / Not applicable</option>
          ${SKILL_CATEGORIES.map(category => `<option value="${category}" ${skill.category === category ? 'selected' : ''}>${category}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Skill Level</label>
        <input type="number" id="edit-skill-level" class="form-input" min="0" max="12" value="${skill.level ?? 0}">
      </div>
      <div class="form-group">
        <label class="form-label">Skill Description</label>
        <textarea id="edit-skill-description" class="form-input" rows="3" style="resize:vertical">${App.escHtml(skill.description || '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Coaching Notes</label>
        <textarea id="edit-coaching-notes" class="form-input" rows="3" style="resize:vertical">${App.escHtml(skill.coachingNotes || '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Photo URL</label>
        <input type="url" id="edit-photo-url" class="form-input" placeholder="https://media.divedrills.com/dive-photos/skill-name.jpg" value="${App.escHtml(skill.photoUrl || '')}">
        <div class="text-secondary text-sm mt-1">Use lowercase filenames with hyphens. Example: forward-dive-pike.jpg</div>
        <div id="edit-photo-preview" class="mt-2"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Video URL</label>
        <input type="url" id="edit-video-url" class="form-input" placeholder="https://media.divedrills.com/dive-videos/skill-name.mp4" value="${App.escHtml(skill.videoUrl || '')}">
        <div class="text-secondary text-sm mt-1">Use lowercase filenames with hyphens. Example: forward-dive-pike.mp4</div>
      </div>
      <div class="section-title mb-2" style="font-size:0.7rem">Advanced</div>
      <div class="form-group">
        <label class="form-label text-sm">Skill Order</label>
        <input type="number" id="edit-skill-order" class="form-input" value="${skill.order ?? ''}">
        <div class="text-secondary text-sm mt-1">Controls display order within the curriculum. Current curriculum range is 10 to 6440. Coach-created skills start at 10000.</div>
      </div>
      <div class="form-group">
        <div class="flex items-center gap-2">
          <label class="toggle-switch">
            <input type="checkbox" id="edit-is-testable" ${skill.isTestable ? '' : 'checked'}>
            <span class="toggle-slider"></span>
          </label>
          <span class="text-sm text-secondary">Supplemental Skill</span>
        </div>
        <div class="text-secondary text-sm mt-1">When checked this skill will appear in Supplemental Skills only and will not count toward level certification</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-primary btn-sm" id="save-skill-edit-btn" onclick="saveSkillEdit(${skillId})">Save</button>
      </div>
    `;

    document.getElementById('edit-photo-url').addEventListener('input', updateEditPhotoPreview);
    updateEditPhotoPreview();
    showSkillEditView();
  }

  function updateEditPhotoPreview() {
    const url     = document.getElementById('edit-photo-url').value.trim();
    const preview = document.getElementById('edit-photo-preview');

    if (!url) { preview.innerHTML = ''; return; }

    preview.innerHTML = `<img alt="" class="skill-thumb" loading="lazy">`;
    const img = preview.querySelector('img');
    img.src = url;
    img.addEventListener('click', () => App.openImageLightbox(url));
  }

  async function saveSkillEdit(skillId) {
    const btn      = document.getElementById('save-skill-edit-btn');
    const name     = document.getElementById('edit-skill-name').value.trim();
    const type     = document.getElementById('edit-skill-type').value;
    const category = document.getElementById('edit-skill-category').value;

    if (!name || !type) {
      App.showToast('Skill Name and Skill Type are required.', 'error');
      return;
    }

    App.setBtnLoading(btn, true);

    try {
      const skill          = allSkills.find(s => s.id === skillId);
      const level          = document.getElementById('edit-skill-level').value;
      const description    = document.getElementById('edit-skill-description').value.trim();
      const coachingNotes  = document.getElementById('edit-coaching-notes').value.trim();
      const photoUrl       = document.getElementById('edit-photo-url').value.trim();
      const videoUrl       = document.getElementById('edit-video-url').value.trim();
      const isTestable     = !document.getElementById('edit-is-testable').checked;
      const order          = document.getElementById('edit-skill-order').value;

      await Skills.update(skillId, {
        skill_name:        name,
        skill_type:        type,
        skill_category:    category || null,
        skill_level:       level === '' ? 0 : Number(level),
        skill_order:       order === '' ? skill.order : Number(order),
        skill_description: description || null,
        coaching_notes:    coachingNotes || null,
        photo_url:         photoUrl || null,
        video_url:         videoUrl || null,
        is_testable:       isTestable,
      });

      skill.name          = name;
      skill.type          = type;
      skill.category      = category;
      skill.level         = level === '' ? 0 : Number(level);
      skill.order         = order === '' ? skill.order : Number(order);
      skill.description   = description;
      skill.coachingNotes = coachingNotes;
      skill.photoUrl      = photoUrl || null;
      skill.videoUrl      = videoUrl || null;
      skill.isTestable    = isTestable;

      App.showToast('Skill updated.');
      openSkillModal(skill);
      applyFilters();
    } catch (err) {
      App.showToast(err.message, 'error');
      App.setBtnLoading(btn, false);
    }
  }

  document.getElementById('skill-modal').addEventListener('click', function(e) {
    if (e.target === this) App.closeModal('skill-modal');
  });

  document.getElementById('create-skill-modal').addEventListener('click', function(e) {
    if (e.target === this) closeCreateSkillModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      App.closeModal('skill-modal');
      App.closeModal('create-skill-modal');
    }
  });

  // =============================================
  // COACH — CREATE SKILL
  // =============================================
  function populateSkillTypeOptions() {
    const typeSel = document.getElementById('create-skill-type');
    SECTION_ORDER.forEach(type => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = type;
      typeSel.appendChild(opt);
    });

    const categorySel = document.getElementById('create-skill-category');
    SKILL_CATEGORIES.forEach(category => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = category;
      categorySel.appendChild(opt);
    });
  }

  async function openCreateSkillModal() {
    document.getElementById('create-skill-name').value        = '';
    document.getElementById('create-skill-type').value        = '';
    document.getElementById('create-skill-category').value    = '';
    document.getElementById('create-skill-level').value       = '0';
    document.getElementById('create-skill-order').value       = '10000';
    document.getElementById('create-skill-description').value = '';
    document.getElementById('create-skill-photo-url').value   = '';
    document.getElementById('create-skill-video-url').value   = '';
    document.getElementById('create-skill-photo-preview').innerHTML = '';
    document.getElementById('create-skill-video-status').innerHTML  = '';
    App.hideAlert('create-skill-alert');
    App.openModal('create-skill-modal');

    try {
      const nextOrder = await Skills.getNextOrder();
      document.getElementById('create-skill-order').value = String(nextOrder);
    } catch (err) {
      // Leave the default of 10000 if the lookup fails.
    }
  }

  function closeCreateSkillModal() {
    App.closeModal('create-skill-modal');
  }

  function updateCreateSkillPhotoPreview() {
    const url     = document.getElementById('create-skill-photo-url').value.trim();
    const preview = document.getElementById('create-skill-photo-preview');

    if (!url) { preview.innerHTML = ''; return; }

    preview.innerHTML = `<img alt="" class="skill-thumb" loading="lazy">`;
    const img = preview.querySelector('img');
    img.src = url;
    img.addEventListener('click', () => App.openImageLightbox(url));
  }

  function updateCreateSkillVideoStatus() {
    const input  = document.getElementById('create-skill-video-url');
    const status = document.getElementById('create-skill-video-status');
    const url    = input.value.trim();

    if (!url) { status.textContent = ''; status.className = 'text-sm mt-1'; return; }

    if (input.checkValidity()) {
      status.textContent = '✓ Valid video URL';
      status.className   = 'text-sm mt-1 text-accent';
    } else {
      status.textContent = 'Please enter a valid URL.';
      status.className   = 'text-sm mt-1 text-danger';
    }
  }

  document.getElementById('create-skill-photo-url').addEventListener('input', updateCreateSkillPhotoPreview);
  document.getElementById('create-skill-video-url').addEventListener('input', updateCreateSkillVideoStatus);

  async function submitCreateSkill() {
    const name        = document.getElementById('create-skill-name').value.trim();
    const type        = document.getElementById('create-skill-type').value;
    const category    = document.getElementById('create-skill-category').value.trim();
    const level       = document.getElementById('create-skill-level').value;
    const order       = document.getElementById('create-skill-order').value;
    const description = document.getElementById('create-skill-description').value.trim();
    const photoUrl    = document.getElementById('create-skill-photo-url').value.trim();
    const videoUrl    = document.getElementById('create-skill-video-url').value.trim();

    if (!name || !type) {
      App.showAlert('create-skill-alert', 'Skill Name and Skill Type are required.');
      return;
    }

    const btn = document.getElementById('create-skill-submit-btn');
    App.setBtnLoading(btn, true);
    App.hideAlert('create-skill-alert');

    try {
      const skill = await Skills.create({
        skill_name:        name,
        skill_type:        type,
        skill_category:    category || null,
        skill_level:       level === '' ? 0 : Number(level),
        skill_order:       order === '' ? 10000 : Number(order),
        skill_description: description || null,
        photo_url:         photoUrl || null,
        video_url:         videoUrl || null,
        is_testable:       false,
      });

      allSkills.push(skill);
      activeTab = skill.isTestable ? 'curriculum' : 'supplemental';
      document.querySelectorAll('.skill-view-btn').forEach(btnEl => {
        btnEl.classList.toggle('active', btnEl.dataset.tab === activeTab);
      });

      App.showToast('Skill created successfully!');
      closeCreateSkillModal();
      applyFilters();
    } catch (err) {
      App.showAlert('create-skill-alert', err.message);
    } finally {
      App.setBtnLoading(btn, false);
    }
  }
</script>

</body>
</html>
